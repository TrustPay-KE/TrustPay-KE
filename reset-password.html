<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TrustPay KE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --accent: #9333ea;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-900: #111827;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            padding: 2rem;
        }
        .container { width: 100%; max-width: 440px; }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.6s ease forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-600); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.5; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-900); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; font-family: inherit; transition: all 0.2s; background: white; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-600); padding: 0.25rem; }
        .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(13,148,136,0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; display: none; }
        .message.success { background: #d1fae5; color: #065f46; display: block; }
        .message.error { background: #fee2e2; color: #991b1b; display: block; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .back-link { text-align: center; margin-top: 1.5rem; color: var(--gray-600); font-size: 0.9rem; }
        .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .back-link a:hover { text-decoration: underline; }
        .icon-box { width: 64px; height: 64px; background: rgba(13,148,136,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
        .icon-box i { font-size: 1.75rem; color: var(--primary); }
        .requirements { background: var(--gray-50); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--gray-600); }
        .requirements p { margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .requirements p:last-child { margin-bottom: 0; }
        .requirements i.check { color: #10b981; }
        .requirements i.x { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            
            <div class="icon-box">
                <i class="fas fa-lock"></i>
            </div>
            
            <h1>Create New Password</h1>
            <p class="subtitle">Enter a strong password to secure your account.</p>
            
            <div id="message" class="message"></div>
            
            <form id="newPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">New Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="newPassword" placeholder="Enter new password" required oninput="checkPassword()">
                        <button type="button" class="password-toggle" onclick="togglePassword('newPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm new password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="requirements" id="requirements">
                    <p><i class="fas fa-circle" id="req-length"></i> At least 6 characters</p>
                    <p><i class="fas fa-circle" id="req-match"></i> Passwords match</p>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
            </form>
            
            <div class="back-link">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
        }
        
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            const btn = input.nextElementSibling;
            const icon = btn.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
        
        function checkPassword() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const reqLength = document.getElementById('req-length');
            const reqMatch = document.getElementById('req-match');
            
            // Length check
            if (password.length >= 6) {
                reqLength.className = 'fas fa-check-circle check';
            } else {
                reqLength.className = 'fas fa-circle';
            }
            
            // Match check
            if (confirm.length > 0) {
                if (password === confirm && password.length >= 6) {
                    reqMatch.className = 'fas fa-check-circle check';
                } else {
                    reqMatch.className = 'fas fa-times-circle x';
                }
            } else {
                reqMatch.className = 'fas fa-circle';
            }
        }
        
        document.getElementById('confirmPassword').addEventListener('input', checkPassword);
        
        document.getElementById('newPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Resetting...';
            
            try {
                // Get the hash parameters from URL (Supabase sends token in hash)
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                
                if (accessToken) {
                    // Set the session with the tokens from URL
                    const { error: sessionError } = await supabaseClient.auth.setSession({
                        access_token: accessToken,
                        refresh_token: refreshToken
                    });
                    
                    if (sessionError) {
                        console.error('Session error:', sessionError);
                        showMessage('Link expired. Please request a new password reset.', 'error');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Reset Password';
                        return;
                    }
                    
                    // Update the password
                    const { error } = await supabaseClient.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (error) {
                        console.error('Update error:', error);
                        showMessage(error.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Reset Password';
                        return;
                    }
                    
                    showMessage('✓ Password reset successful! Redirecting to login...', 'success');
                    submitBtn.textContent = '✓ Success!';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showMessage('Invalid reset link. Please request a new password reset.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                console.error('Reset error:', error);
                showMessage('Failed to reset password. The link may have expired.', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
        
        // Check if we have a valid hash on page load
        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash;
            if (!hash || !hash.includes('access_token')) {
                showMessage('Invalid reset link. Please request a new password reset from the login page.', 'error');
                document.getElementById('newPasswordForm').style.display = 'none';
                document.querySelector('.icon-box').innerHTML = '<i class="fas fa-exclamation-triangle" style="color: #ef4444;"></i>';
                document.querySelector('h1').textContent = 'Invalid Link';
            }
        });
    </script>
</body>
</html>
