<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>New Password | TrustPay Kenya</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/><path d='M50 20 L75 35 L75 55 C75 70 65 80 50 85 C35 80 25 70 25 55 L25 35 Z' fill='white'/></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --gray-200: #e5e7eb;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-900: #111827;
            --success: #10b981;
            --error: #ef4444;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--gray-900) 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), #9333ea);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-icon svg { width: 24px; height: 24px; fill: white; }
        .logo-text { font-size: 1.25rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .desc { color: var(--gray-500); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        
        .message {
            padding: 0.875rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--gray-700); font-size: 0.85rem; }
        
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }
        
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 3rem; }
        
        .password-toggle {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--gray-400);
            padding: 0.4rem;
        }
        
        .password-toggle:hover { color: var(--primary); }
        .password-toggle svg { width: 18px; height: 18px; display: block; }
        
        .password-strength { margin-top: 0.5rem; }
        .strength-bar { height: 4px; background: #e5e7eb; border-radius: 2px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: all 0.3s; border-radius: 2px; }
        .strength-fill.strength-0 { width: 0%; background: #d1d5db; }
        .strength-fill.strength-1 { width: 25%; background: #ef4444; }
        .strength-fill.strength-2 { width: 50%; background: #f97316; }
        .strength-fill.strength-3 { width: 75%; background: #eab308; }
        .strength-fill.strength-4 { width: 100%; background: #22c55e; }
        
        .strength-text { font-size: 0.7rem; margin-top: 0.25rem; color: var(--gray-400); }
        .strength-text.strength-1 { color: #ef4444; }
        .strength-text.strength-2 { color: #f97316; }
        .strength-text.strength-3 { color: #eab308; }
        .strength-text.strength-4 { color: #22c55e; }
        
        .btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(13, 148, 136, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .back-link {
            text-align: center;
            margin-top: 1.25rem;
        }
        
        .back-link a { color: var(--gray-500); text-decoration: none; font-size: 0.85rem; }
        .back-link a:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
            </div>
            <span class="logo-text">TrustPay <span>KE</span></span>
        </div>
        
        <h1>New Password</h1>
        <p class="desc">Create your new password</p>
        
        <div id="message" class="message"></div>
        
        <form id="passwordForm">
            <div class="form-group">
                <label class="form-label" for="newPassword">New Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="newPassword" placeholder="Enter new password" required autofocus>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar"><div class="strength-fill strength-0" id="strengthFill"></div></div>
                    <span class="strength-text" id="strengthText"></span>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm new password" required>
                    <button type="button" class="password-toggle" id="toggleConfirm">
                        <svg id="eyeIcon2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                <span id="btnText">Update Password</span>
                <div id="btnSpinner" class="spinner" style="display: none;"></div>
            </button>
        </form>
        
        <div class="back-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';
            
            let supabase = null;
            
            function waitForSupabase(callback, attempts = 0) {
                if (typeof window.supabase !== 'undefined') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    callback();
                } else if (attempts < 50) {
                    setTimeout(() => waitForSupabase(callback, attempts + 1), 100);
                } else {
                    document.getElementById('message').textContent = 'Failed to load. Please refresh the page.';
                    document.getElementById('message').className = 'message error';
                    document.getElementById('message').style.display = 'block';
                }
            }

            const form = document.getElementById('passwordForm');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const messageEl = document.getElementById('message');
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');
            
            function showMessage(msg, type) {
                messageEl.textContent = msg;
                messageEl.className = 'message ' + type;
                messageEl.style.display = 'block';
            }
            
            function setLoading(loading) {
                submitBtn.disabled = loading;
                newPasswordInput.disabled = loading;
                confirmPasswordInput.disabled = loading;
                btnText.textContent = loading ? 'Updating...' : 'Update Password';
                btnSpinner.style.display = loading ? 'block' : 'none';
            }
            
            function updateStrength(password) {
                let strength = 0;
                if (password.length >= 8) strength++;
                if (/[a-z]/.test(password)) strength++;
                if (/[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;
                if (/[!@#$%^&*]/.test(password)) strength++;
                
                strengthFill.className = 'strength-fill strength-' + Math.min(strength, 4);
                const labels = ['', 'Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
                strengthText.textContent = strength > 0 ? labels[Math.min(strength, 4)] : '';
                strengthText.className = 'strength-text strength-' + Math.min(strength, 4);
            }
            
            newPasswordInput.addEventListener('input', () => updateStrength(newPasswordInput.value));
            
            document.getElementById('togglePassword').addEventListener('click', () => {
                const isPassword = newPasswordInput.type === 'password';
                newPasswordInput.type = isPassword ? 'text' : 'password';
            });
            
            document.getElementById('toggleConfirm').addEventListener('click', () => {
                const isPassword = confirmPasswordInput.type === 'password';
                confirmPasswordInput.type = isPassword ? 'text' : 'password';
            });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const newPassword = newPasswordInput.value;
                const confirmPassword = confirmPasswordInput.value;
                
                if (!newPassword || !confirmPassword) {
                    showMessage('Please fill in all fields.', 'error');
                    return;
                }
                
                if (newPassword.length < 8) {
                    showMessage('Password must be at least 8 characters.', 'error');
                    return;
                }
                
                if (newPassword !== confirmPassword) {
                    showMessage('Passwords do not match.', 'error');
                    return;
                }
                
                setLoading(true);
                
                try {
                    const { error } = await supabase.auth.updateUser({
                        password: newPassword
                    });
                    
                    if (error) throw error;
                    
                    showMessage('Password updated! Redirecting to login...', 'success');
                    setLoading(false);
                    setTimeout(() => window.location.href = 'login.html', 1500);
                    
                } catch (err) {
                    console.error('Update error:', err);
                    setLoading(false);
                    
                    if (err.message?.includes('Invalid') || err.code === 401) {
                        showMessage('This reset link has expired. Please request a new one.', 'error');
                    } else {
                        showMessage('Failed to update password. Please try again.', 'error');
                    }
                }
            });

            waitForSupabase(() => {
                console.log('Supabase ready');
            });
        })();
    </script>
</body>
</html>
