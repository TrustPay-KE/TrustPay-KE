<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Reset Password | TrustPay KE</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<script defer
src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js">
</script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* YOUR CSS KEPT SAME */

body{

font-family:'Inter',sans-serif;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

background:

linear-gradient(
135deg,
#0f172a,
#1e293b
);

padding:2rem;

}

.card{

background:white;

border-radius:20px;

padding:2.5rem;

max-width:440px;

width:100%;

box-shadow:

0 20px 40px rgba(0,0,0,.3);

}

.form-input{

width:100%;

padding:.9rem;

border-radius:12px;

border:2px solid #e5e7eb;

margin-bottom:1rem;

}

.submit-btn{

width:100%;

padding:1rem;

background:

linear-gradient(

135deg,

#0d9488,

#0f766e

);

border:none;

border-radius:12px;

color:white;

font-weight:600;

cursor:pointer;

}

.message{

display:none;

margin-bottom:1rem;

padding:1rem;

border-radius:12px;

}

.message.error{

background:#fee2e2;

color:#991b1b;

display:block;

}

.message.success{

background:#d1fae5;

color:#065f46;

display:block;

}

.spinner{

width:18px;

height:18px;

border-radius:50%;

border:2px solid rgba(255,255,255,.4);

border-top:white;

display:inline-block;

animation:spin 1s linear infinite;

margin-right:.4rem;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

</style>

</head>


<body>


<div class="card">

<h2>Create New Password</h2>

<div id="message"
class="message"></div>

<form id="newPasswordForm">

<input

id="newPassword"

type="password"

class="form-input"

placeholder="New password"

required>

<input

id="confirmPassword"

type="password"

class="form-input"

placeholder="Confirm password"

required>

<button

id="submitBtn"

class="submit-btn">

Reset Password

</button>

</form>

</div>



<script>

document.addEventListener(

"DOMContentLoaded",

async ()=>{


if(!window.supabase){

console.error(

"Supabase not loaded"

);

return;

}


const {

createClient

}

=

window.supabase;


const supabaseClient=

createClient(

"https://gifgxyxuzugbkqfpnxxb.supabase.co",

"sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu",

{

auth:{

persistSession:true,

autoRefreshToken:true,

detectSessionInUrl:true

}

}

);


function showMessage(msg,type){

const el=

document.getElementById(

"message"

);

el.textContent=msg;

el.className=

"message "+type;

}


/* GET TOKENS */

const hash=

window.location.hash.substring(1);

const params=

new URLSearchParams(

hash

);


const accessToken=

params.get(

"access_token"

);

const refreshToken=

params.get(

"refresh_token"

);



if(!accessToken){

showMessage(

"Invalid or expired reset link.",

"error"

);

document

.getElementById(

"newPasswordForm"

)

.style.display="none";

return;

}



/* SET SESSION */

try{

const{

error

}

=

await supabaseClient

.auth

.setSession({

access_token:

accessToken,

refresh_token:

refreshToken

});


if(error){

showMessage(

"Reset link expired. Request new one.",

"error"

);

return;

}

}catch(e){

showMessage(

"Invalid reset session.",

"error"

);

return;

}



/* FORM */

document

.getElementById(

"newPasswordForm"

)

.addEventListener(

"submit",

async(e)=>{

e.preventDefault();


const newPass=

document

.getElementById(

"newPassword"

)

.value;


const confirm=

document

.getElementById(

"confirmPassword"

)

.value;


const btn=

document

.getElementById(

"submitBtn"

);



if(newPass.length<6){

showMessage(

"Password must be 6+ characters.",

"error"

);

return;

}


if(newPass!==confirm){

showMessage(

"Passwords do not match.",

"error"

);

return;

}


btn.disabled=true;

btn.innerHTML=

'<span class="spinner"></span>Resetting...';


try{

const{

error

}

=

await supabaseClient

.auth

.updateUser({

password:newPass

});


if(error){

showMessage(

error.message,

"error"

);

btn.disabled=false;

btn.textContent=

"Reset Password";

return;

}


showMessage(

"Password reset successful! Redirecting...",

"success"

);


setTimeout(()=>{

location.replace(

"login.html"

);

},2000);


}catch(e){

showMessage(

"Reset failed.",

"error"

);

btn.disabled=false;

btn.textContent=

"Reset Password";

}

}

);

});

</script>

</body>
</html>
