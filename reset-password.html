<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TrustPay KE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0d9488; --primary-dark: #0f766e; --gray-200: #e5e7eb; --gray-600: #4b5563; --gray-900: #111827; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a, #1e293b); padding: 2rem; }
        .container { width: 100%; max-width: 420px; }
        .card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), #9333ea); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.4rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-600); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-900); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.875rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .submit-btn:disabled { opacity: 0.6; }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.9rem; }
        .message.success { background: #d1fae5; color: #065f46; }
        .message.error { background: #fee2e2; color: #991b1b; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .link { text-align: center; margin-top: 1.5rem; color: var(--gray-600); font-size: 0.9rem; }
        .link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .reqs { background: #f9fafb; padding: 0.75rem; border-radius: 8px; font-size: 0.8rem; color: var(--gray-600); margin-bottom: 1rem; }
        .reqs p { margin: 0.25rem 0; display: flex; align-items: center; gap: 0.5rem; }
        .reqs i.check { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            <h1>Create New Password</h1>
            <p class="subtitle">Enter a strong password to secure your account.</p>
            <div class="reqs">
                <p><i id="icon-len"></i> At least 6 characters</p>
                <p><i id="icon-match"></i> Passwords match</p>
            </div>
            <div id="message" class="message"></div>
            <form id="passwordForm">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="Enter new password" required oninput="checkPwd()">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required oninput="checkPwd()">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
            </form>
            <p class="link"><a href="login.html">← Back to Login</a></p>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showMessage(msg, type) {
            document.getElementById('message').textContent = msg;
            document.getElementById('message').className = 'message ' + type;
        }
        
        function checkPwd() {
            const pwd = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;
            document.getElementById('icon-len').textContent = pwd.length >= 6 ? '✓' : '○';
            document.getElementById('icon-match').textContent = (conf && pwd === conf) ? '✓' : '○';
        }
        
        // Check for valid reset link
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash;
            if (!hash || !hash.includes('access_token')) {
                showMessage('Invalid link. Go to Forgot Password to get a new link.', 'error');
                document.getElementById('passwordForm').style.display = 'none';
            }
        });
        
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPwd = document.getElementById('newPassword').value;
            const confPwd = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            
            if (newPwd.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            if (newPwd !== confPwd) {
                showMessage('Passwords do not match.', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Resetting...';
            
            try {
                // Get tokens from URL hash
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                
                if (!accessToken) {
                    showMessage('Invalid link. Request new password reset.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }
                
                // Set session and update password
                const { error: sessionError } = await supabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                
                if (sessionError) {
                    showMessage('Link expired. Request new password reset.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }
                
                const { error } = await supabase.auth.updateUser({ password: newPwd });
                
                if (error) {
                    showMessage(error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }
                
                showMessage('✓ Password reset successful! Redirecting to login...', 'success');
                btn.textContent = '✓ Done!';
                setTimeout(function() {
                    window.location.href = 'login.html';
                }, 2000);
            } catch (err) {
                showMessage('Error. Link may be expired.', 'error');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
