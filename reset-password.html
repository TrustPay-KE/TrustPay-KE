        .search-toggle { background: none; border: none; cursor: pointer; padding: 0.5rem; border-radius: 8px; color: var(--gray-600); }

        .search-result-item:hover { background: var(--gray-100); }
        .search-result-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }

<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            <h1>Create New Password</h1>
            <p class="subtitle">Enter a strong password to secure your account.</p>
            <div class="reqs">
                <p><i id="icon-len"></i> At least 6 characters</p>
                <p><i id="icon-match"></i> Passwords match</p>
            </div>
            <div id="message" class="message"></div>
            <form id="passwordForm" autocomplete="new-password">
                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" class="form-input" id="newPassword" placeholder="Enter new password" autocomplete="new-password" required oninput="checkPwd()">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" autocomplete="new-password" required oninput="checkPwd()">
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">Reset Password</button>
            </form>
            <p class="link"><a href="login.html">← Back to Login</a></p>
        </div>
    </div>

    <div class="header-actions" style="position:fixed;top:1rem;right:1rem;">
        <button class="search-toggle" id="searchToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-modal-content">
            <div class="search-header">
                <input type="text" class="search-input" id="searchInput" placeholder="Search TrustPay KE..." autocomplete="off">
                <button class="search-close" id="searchClose"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="search-results" id="searchResults"><div class="search-hint">Start typing to search...</div></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showMessage(msg, type) {
            document.getElementById('message').textContent = msg;
            document.getElementById('message').className = 'message ' + type;
        }
        
        function checkPwd() {
            const pwd = document.getElementById('newPassword').value;
            const conf = document.getElementById('confirmPassword').value;
            document.getElementById('icon-len').textContent = pwd.length >= 6 ? '✓' : '○';
            document.getElementById('icon-match').textContent = (conf && pwd === conf) ? '✓' : '○';
        }
        
        // Check for valid reset link
        window.addEventListener('DOMContentLoaded', function() {
            const hash = window.location.hash;
            console.log('Reset password page, hash:', hash);
            
            if (!hash || !hash.includes('access_token')) {
                showMessage('Invalid or expired reset link. Go to Forgot Password to get a new link.', 'error');
                document.getElementById('passwordForm').style.display = 'none';
            }
        });
        
        document.getElementById('passwordForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPwd = document.getElementById('newPassword').value;
            const confPwd = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('submitBtn');
            
            if (newPwd.length < 6) {
                showMessage('Password must be at least 6 characters.', 'error');
                return;
            }
            if (newPwd !== confPwd) {
                showMessage('Passwords do not match.', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Resetting...';
            
            try {
                // Get tokens from URL hash
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const accessToken = hashParams.get('access_token');
                const refreshToken = hashParams.get('refresh_token');
                
                console.log('Tokens found:', { accessToken: !!accessToken, refreshToken: !!refreshToken });
                
                if (!accessToken) {
                    showMessage('Invalid link. Request new password reset.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }
                
                // Set session and update password
                const { error: sessionError } = await supabase.auth.setSession({
                    access_token: accessToken,
                    refresh_token: refreshToken
                });
                
                if (sessionError) {
                    console.error('Session error:', sessionError);
                    showMessage('Link expired. Request new password reset.', 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }
                
                const { error } = await supabase.auth.updateUser({ password: newPwd });
                
                if (error) {
                    console.error('Update error:', error);
                    showMessage('Error: ' + error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }
                
                console.log('Password updated successfully');
                showMessage('✓ Password reset successful! Redirecting to login...', 'success');
                btn.textContent = '✓ Done!';
                
                setTimeout(function() {
                    window.location.href = 'login.html?reset=true';
                }, 2000);
            } catch (err) {
                console.error('Reset exception:', err);
                showMessage('Error. Link may be expired.', 'error');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });

        const searchToggle = document.getElementById('searchToggle');
        const searchModal = document.getElementById('searchModal');
        const searchClose = document.getElementById('searchClose');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchData = [
            { title: 'How Escrow Works', desc: 'Learn how our escrow protection works', url: 'index.html#how' },
            { title: 'Fees & Pricing', desc: 'View our transparent fee structure', url: 'index.html#fees' },
            { title: 'Start an Order', desc: 'Create your first protected transaction', url: 'start-order.html' },
            { title: 'Login', desc: 'Access your TrustPay account', url: 'login.html' },
            { title: 'Sign Up', desc: 'Create a free account today', url: 'signup.html' },
            { title: 'Blog', desc: 'Read our latest articles and guides', url: 'blog.html' },
            { title: 'Safety Guide', desc: 'Protect yourself from scams', url: 'safety-guide.html' },
            { title: 'About Us', desc: 'Learn about TrustPay KE', url: 'about.html' },
            { title: 'Contact Us', desc: 'Get in touch with our team', url: 'contact.html' },
            { title: 'Privacy Policy', desc: 'How we protect your data', url: 'privacy.html' },
            { title: 'Terms of Service', desc: 'Our terms and conditions', url: 'terms.html' },
            { title: 'Dispute Resolution', desc: 'How we handle disputes', url: 'dispute-policy.html' }
        ];
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div class="search-hint">Start typing to search...</div>'; return; }
            const results = searchIndex.search(query);
            if (results.length === 0) { searchResults.innerHTML = '<div class="search-hint">No results found.</div>'; return; }
            searchResults.innerHTML = results.map(item => `<a href="${item.url}" class="search-result-item"><div class="search-result-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div class="search-result-text"><h4>${item.title}</h4><p>${item.snippet}</p></div></a>`).join('');
        }
        searchToggle.addEventListener('click', () => { searchModal.classList.add('active'); setTimeout(() => searchInput.focus(), 100); });
        searchClose.addEventListener('click', () => searchModal.classList.remove('active'));
        searchModal.addEventListener('click', (e) => { if (e.target === searchModal) searchModal.classList.remove('active'); });
        searchInput.addEventListener('input', (e) => performSearch(e.target.value));
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && searchModal.classList.contains('active')) searchModal.classList.remove('active'); if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchModal.classList.add('active'); setTimeout(() => searchInput.focus(), 100); } });
    </script>
    <script src="search-index.js"></script>
</body>
