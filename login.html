<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login | TrustPay KE</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<script defer
src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js">
</script>

<style>

/* YOUR CSS EXACTLY SAME */

*{margin:0;padding:0;box-sizing:border-box}

:root{
--primary:#0d9488;
--primary-dark:#0f766e;
--accent:#9333ea;
--gray-50:#f9fafb;
--gray-100:#f3f4f6;
--gray-200:#e5e7eb;
--gray-600:#4b5563;
--gray-900:#111827;
}

body{

font-family:'Inter',sans-serif;

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

background:
linear-gradient(
135deg,
#0f172a 0%,
#1e293b 100%
);

padding:2rem;

}

.login-container{
width:100%;
max-width:440px;
}

.login-card{

background:
rgba(255,255,255,.95);

border-radius:24px;

padding:2.5rem;

box-shadow:
0 25px 50px rgba(0,0,0,.3);

}

.logo{
display:flex;
justify-content:center;
gap:.75rem;
margin-bottom:2rem;
}

.logo-text{

font-weight:800;

font-size:1.5rem;

}

.logo-text span{

color:var(--primary);

}

.form-group{

margin-bottom:1.2rem;

}

.form-input{

width:100%;

padding:.9rem;

border:2px solid var(--gray-200);

border-radius:12px;

}

.login-btn{

width:100%;

padding:1rem;

background:

linear-gradient(
135deg,
var(--primary),
var(--primary-dark)
);

border:none;

border-radius:12px;

color:white;

font-weight:600;

cursor:pointer;

}

.message{

display:none;

padding:1rem;

border-radius:12px;

margin-bottom:1rem;

}

.message.error{

background:#fee2e2;

color:#991b1b;

display:block;

}

.message.success{

background:#d1fae5;

color:#065f46;

display:block;

}

.spinner{

display:inline-block;

width:18px;

height:18px;

border:2px solid rgba(255,255,255,.4);

border-top:white;

border-radius:50%;

animation:spin 1s linear infinite;

margin-right:.4rem;

}

@keyframes spin{

to{transform:rotate(360deg)}

}

</style>
</head>

<body>

<div class="login-container">

<div class="login-card">

<h1>Welcome Back</h1>

<p style="margin-bottom:1.5rem">

Sign in to your account

</p>

<div id="message"
class="message">

</div>


<form id="loginForm">

<div class="form-group">

<input

id="email"

type="email"

class="form-input"

placeholder="Email"

required>

</div>


<div class="form-group">

<input

id="password"

type="password"

class="form-input"

placeholder="Password"

required>

</div>

<button

id="submitBtn"

class="login-btn">

Sign In

</button>

</form>

</div>

</div>



<script>

document.addEventListener(

"DOMContentLoaded",

async ()=>{

/* WAIT SUPABASE LOAD */

if(!window.supabase){

console.error(

"Supabase not loaded"

);

return;

}


/* INIT */

const {

createClient

}=window.supabase;


const supabaseClient=

createClient(

"https://gifgxyxuzugbkqfpnxxb.supabase.co",

"sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu",

{

auth:{

persistSession:true,

autoRefreshToken:true,

detectSessionInUrl:true

}

}

);



function showMessage(msg,type){

const el=

document.getElementById("message");

el.textContent=msg;

el.className="message "+type;

el.style.display="block";

}



/* SESSION CHECK */

try{

const{

data:{session}

}

=

await supabaseClient

.auth

.getSession();



if(session?.user){

localStorage.setItem(

"trustpay_user",

JSON.stringify({

id:session.user.id,

email:session.user.email,

name:

session.user.user_metadata?.name

||"User"

})

);


location.replace(

"dashboard.html"

);

return;

}

}catch(e){

console.log(e);

}



/* LOGIN */

document

.getElementById(

"loginForm"

)

.addEventListener(

"submit",

async(e)=>{

e.preventDefault();


const email=

document

.getElementById(

"email"

)

.value

.trim()

.toLowerCase();


const password=

document

.getElementById(

"password"

)

.value;


const btn=

document

.getElementById(

"submitBtn"

);


btn.disabled=true;

btn.innerHTML=

'<span class="spinner"></span>Signing...';


try{

const{

data,

error

}

=

await supabaseClient

.auth

.signInWithPassword({

email,

password

});



if(error){

showMessage(

error.message,

"error"

);

btn.disabled=false;

btn.textContent=

"Sign In";

return;

}



localStorage.setItem(

"trustpay_user",

JSON.stringify({

id:data.user.id,

email:data.user.email,

name:

data.user.user_metadata?.name

||"User"

})

);


showMessage(

"Login successful!",

"success"

);


setTimeout(()=>{

location.replace(

"dashboard.html"

);

},900);



}catch(err){

console.log(err);

showMessage(

"Unexpected error",

"error"

);

btn.disabled=false;

btn.textContent="Sign In";

}

}

);

}

);

</script>

</body>
</html>
