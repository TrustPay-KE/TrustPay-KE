<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrustPay KE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        /* Same styles as before - keep them */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0d9488; --primary-dark: #0f766e; --accent: #9333ea; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-600: #4b5563; --gray-900: #111827; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 2rem; }
        .login-container { width: 100%; max-width: 420px; }
        .login-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-600); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-900); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-600); }
        .form-actions { display: flex; justify-content: space-between; align-items: center; margin: 1rem 0; }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; }
        .remember-me input { accent-color: var(--primary); }
        .forgot-password { color: var(--primary); text-decoration: none; font-size: 0.875rem; }
        .login-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
        .message.success { background: #d1fae5; color: #065f46; display: block; border-left: 4px solid #10b981; }
        .message.error { background: #fee2e2; color: #991b1b; display: block; border-left: 4px solid #ef4444; }
        .message.info { background: #e0f2fe; color: #0369a1; display: block; border-left: 4px solid #0ea5e9; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .signup-link { text-align: center; margin-top: 1.5rem; color: var(--gray-600); font-size: 0.9rem; }
        .signup-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                </div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account</p>
            <div id="message" class="message"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Enter password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
                    </div>
                </div>
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" checked> <span>Remember me</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
            </form>
            <div class="divider"><span>or</span></div>
            <p class="signup-link">Don't have an account? <a href="signup.html">Create account</a></p>
        </div>
    </div>

    <script>
        // IMPORTANT: Use the SAME key as in signup page
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'YOUR_ACTUAL_ANON_KEY_HERE'; // MUST match signup page

        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        function showMessage(msg, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.className = 'message ' + type;
            msgEl.style.display = 'block';
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        // Check if user is already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'dashboard.html';
            }
        }

        // Handle URL parameters
        window.addEventListener('load', function() {
            checkSession();
            
            const params = new URLSearchParams(window.location.search);
            
            if (params.get('registered') === 'true') {
                const email = params.get('email');
                showMessage(`✅ Account created! Please check ${email || 'your email'} for verification.`, 'success');
            }
            
            if (params.get('verified') === 'true') {
                showMessage('✅ Email verified! You can now login.', 'success');
            }
            
            if (params.get('reset') === 'true') {
                showMessage('✅ Password reset! Please login with new password.', 'success');
            }
            
            if (params.get('unverified') === 'true') {
                showMessage('⚠️ Please verify your email before logging in.', 'info');
            }
            
            if (params.get('error')) {
                showMessage(params.get('error'), 'error');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const btn = document.getElementById('submitBtn');

            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Signing in...';

            try {
                console.log('Attempting login for:', email);

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                console.log('Login response:', data);

                if (error) {
                    console.error('Login error:', error);
                    
                    if (error.message.includes('Invalid login')) {
                        showMessage('❌ Invalid email or password', 'error');
                    } else if (error.message.includes('Email not confirmed')) {
                        showMessage('⚠️ Please verify your email first', 'info');
                    } else {
                        showMessage('Error: ' + error.message, 'error');
                    }
                    
                    btn.disabled = false;
                    btn.innerHTML = 'Sign In';
                    return;
                }

                if (data.user) {
                    // Check if email is verified
                    if (!data.user.email_confirmed_at) {
                        await supabase.auth.signOut();
                        showMessage('⚠️ Please verify your email before logging in', 'info');
                        btn.disabled = false;
                        btn.innerHTML = 'Sign In';
                        return;
                    }

                    // Success! Save user data
                    const userData = {
                        id: data.user.id,
                        email: data.user.email,
                        name: data.user.user_metadata?.full_name || data.user.email?.split('@')[0],
                        phone: data.user.user_metadata?.phone || '',
                        role: 'user'
                    };
                    
                    localStorage.setItem('trustpay_user', JSON.stringify(userData));
                    
                    showMessage('✅ Login successful! Redirecting...', 'success');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }

            } catch (err) {
                console.error('Exception:', err);
                showMessage('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Sign In';
            }
        });
    </script>
</body>
</html>
