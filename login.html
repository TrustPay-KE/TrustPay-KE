<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Login | TrustPay Kenya</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0d9488; --primary-dark: #0f766e; --accent: #9333ea;
            --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
            --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563;
            --gray-700: #374151; --gray-900: #111827;
            --success: #10b981; --error: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--gray-900) 0%, #1e293b 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: white; border-radius: 24px; padding: 2.5rem;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.75rem; font-weight: 700; text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-500); text-align: center; margin-bottom: 2rem; }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; display: none; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .message.info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; display: block; }
        .form-group { margin-bottom: 1.25rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-700); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; font-family: inherit; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(13,148,136,0.1); }
        .form-input::placeholder { color: var(--gray-400); }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 3rem; }
        .password-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-400); padding: 0.5rem; }
        .password-toggle:hover { color: var(--primary); }
        .password-toggle svg { width: 20px; height: 20px; display: block; }
        .form-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; }
        .remember-me input { accent-color: var(--primary); cursor: pointer; }
        .remember-me span { font-size: 0.875rem; color: var(--gray-600); }
        .forgot-password { font-size: 0.875rem; color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot-password:hover { color: var(--primary-dark); text-decoration: underline; }
        .login-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(13,148,136,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .spinner { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
        .divider span { padding: 0 1rem; font-size: 0.875rem; color: var(--gray-500); }
        .signup-link { text-align: center; color: var(--gray-600); font-size: 0.9rem; }
        .signup-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
        .back-link { text-align: center; margin-top: 1rem; }
        .back-link a { color: var(--gray-500); text-decoration: none; font-size: 0.875rem; }
        .back-link a:hover { color: var(--primary); }
        .security-badge { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; padding: 0.75rem; background: var(--gray-100); border-radius: 8px; font-size: 0.75rem; color: var(--gray-500); }
        .security-badge svg { width: 14px; height: 14px; fill: var(--success); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span class="logo-text">TrustPay <span>KE</span></span>
        </div>
        
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>
        
        <div id="message" class="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" class="form-input" id="email" placeholder="you@example.com" required autocomplete="email" autofocus>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            
            <div class="form-actions">
                <label class="remember-me">
                    <input type="checkbox" id="remember" checked>
                    <span>Remember me</span>
                </label>
                <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-btn" id="submitBtn">
                <span id="btnText">Sign In</span>
                <div id="btnSpinner" class="spinner" style="display: none;"></div>
            </button>
        </form>
        
        <div class="divider"><span>or</span></div>
        
        <p class="signup-link">Don't have an account? <a href="signup.html">Create one</a></p>
        
        <div class="back-link">
            <a href="index.html">← Back to Home</a>
        </div>
        
        <div class="security-badge">
            <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            <span>Secured with SSL encryption</span>
        </div>
    </div>

    <script>
        (function() {
            // Supabase config
            const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';
            
            let supabase = null;
            
            function waitForSupabase(callback, attempts = 0) {
                if (typeof window.supabase !== 'undefined') {
                    supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    callback();
                } else if (attempts < 50) {
                    setTimeout(() => waitForSupabase(callback, attempts + 1), 100);
                } else {
                    showMessage('Failed to load. Please refresh.', 'error');
                }
            }
            
            // DOM Elements
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const messageEl = document.getElementById('message');

            function showMessage(msg, type) {
                messageEl.textContent = msg;
                messageEl.className = 'message ' + type;
                messageEl.style.display = 'block';
            }
            
            function hideMessage() { messageEl.style.display = 'none'; }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                emailInput.disabled = loading;
                passwordInput.disabled = loading;
                btnText.textContent = loading ? 'Signing in...' : 'Sign In';
                btnSpinner.style.display = loading ? 'block' : 'none';
            }

            document.getElementById('togglePassword').addEventListener('click', () => {
                passwordInput.type = passwordInput.type === 'password' ? 'text' : 'password';
            });

            function storeUser(user) {
                const data = {
                    id: user.id,
                    email: user.email,
                    name: user.user_metadata?.name || user.email.split('@')[0],
                    phone: user.user_metadata?.phone || '',
                    role: user.user_metadata?.role || 'user'
                };
                localStorage.setItem('trustpay_user', JSON.stringify(data));
            }

            function redirectToDashboard() {
                const userData = JSON.parse(localStorage.getItem('trustpay_user') || '{}');
                const role = userData.role || 'user';
                window.location.href = (role === 'admin' || role === 'director') ? 'operations.html' : 'dashboard.html';
            }

            // Handle logout
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('logout') === 'true') {
                waitForSupabase(() => {
                    supabase.auth.signOut();
                    localStorage.removeItem('trustpay_user');
                    window.history.replaceState({}, document.title, window.location.pathname);
                    showMessage('You have been logged out.', 'info');
                });
            }

            // Check if already logged in
            async function checkAuth() {
                if (!supabase) return;
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session?.user) {
                        storeUser(session.user);
                        redirectToDashboard();
                    }
                } catch (e) {}
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                hideMessage();

                const email = emailInput.value.trim().toLowerCase();
                const password = passwordInput.value;

                if (!email || !password) {
                    showMessage('Please enter both email and password.', 'error');
                    return;
                }

                setLoading(true);

                try {
                    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    
                    if (error) throw error;
                    if (!data.user) throw new Error('Login failed');

                    storeUser(data.user);
                    showMessage('Login successful! Redirecting...', 'success');
                    setLoading(false);
                    setTimeout(() => redirectToDashboard(), 800);

                } catch (err) {
                    setLoading(false);
                    let msg = 'Login failed. Please try again.';
                    
                    if (err.message?.includes('Invalid login') || err.message?.includes('invalid')) {
                        msg = 'Invalid email or password.';
                    } else if (err.message?.includes('Email not confirmed')) {
                        msg = 'Please verify your email first.';
                    } else if (err.message) {
                        msg = err.message;
                    }
                    
                    showMessage(msg, 'error');
                }
            });

            emailInput.addEventListener('input', hideMessage);
            passwordInput.addEventListener('input', hideMessage);

            waitForSupabase(() => {
                checkAuth();
            });
        })();
    </script>
</body>
</html>
