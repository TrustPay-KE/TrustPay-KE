<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrustPay KE</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/><path d='M50 20 L75 35 L75 55 C75 70 65 80 50 85 C35 80 25 70 25 55 L25 35 Z' fill='white'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0d9488; --primary-dark: #0f766e; --accent: #9333ea; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-600: #4b5563; --gray-900: #111827; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 2rem; }
        .login-container { width: 100%; max-width: 420px; }
        .login-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-600); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-900); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; font-family: inherit; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        .form-input.error { border-color: #ef4444; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-600); padding: 0.25rem; display: flex; align-items: center; justify-content: center; }
        .password-toggle:hover { color: var(--primary); }
        .form-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; }
        .remember-me input { width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer; }
        .remember-me span { font-size: 0.875rem; color: var(--gray-600); }
        .forgot-password { font-size: 0.875rem; color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot-password:hover { text-decoration: underline; }
        .login-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .login-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(13,148,136,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
        .divider span { padding: 0 1rem; font-size: 0.875rem; color: var(--gray-600); }
        .signup-link { text-align: center; margin-top: 1.5rem; color: var(--gray-600); font-size: 0.9rem; }
        .signup-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
        .back-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
        .back-link a { color: var(--gray-600); text-decoration: none; }
        .back-link a:hover { color: var(--primary); }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
        .message.success { background: #d1fae5; color: #065f46; display: block; border-left: 4px solid #10b981; }
        .message.error { background: #fee2e2; color: #991b1b; display: block; border-left: 4px solid #ef4444; }
        .message.info { background: #e0f2fe; color: #0369a1; display: block; border-left: 4px solid #0ea5e9; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .resend-link { margin-top: 1rem; text-align: center; font-size: 0.875rem; display: none; }
        .resend-link.show { display: block; }
        .resend-link a { color: var(--primary); cursor: pointer; font-weight: 500; text-decoration: none; }
        .resend-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                </div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            <h1>Welcome Back</h1>
            <p class="subtitle">Sign in to your account</p>
            <div id="message" class="message"></div>
            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="remember" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="#" onclick="showForgotPassword()" class="forgot-password">Forgot password?</a>
                </div>
                <button type="submit" class="login-btn" id="submitBtn">Sign In</button>
            </form>
            
            <!-- Resend verification link (hidden by default) -->
            <div class="resend-link" id="resendVerification">
                Didn't receive verification email? <a onclick="resendVerificationEmail()">Click to resend</a>
            </div>
            
            <div class="divider"><span>or</span></div>
            <p class="signup-link">Don't have an account? <a href="signup.html">Create account</a></p>
            <p class="back-link">
                <a href="index.html">← Back to Home</a>
            </p>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000;">
        <div style="background: white; padding: 2rem; border-radius: 20px; max-width: 400px; width: 90%;">
            <h3 style="margin-bottom: 1rem; color: var(--gray-900);">Reset Password</h3>
            <p style="color: var(--gray-600); margin-bottom: 1.5rem; font-size: 0.9rem;">Enter your email address and we'll send you a password reset link.</p>
            <input type="email" id="resetEmail" class="form-input" placeholder="your@email.com" style="margin-bottom: 1rem;">
            <div style="display: flex; gap: 0.5rem;">
                <button onclick="sendResetEmail()" class="login-btn" style="flex: 2;">Send Reset Link</button>
                <button onclick="closeForgotModal()" class="login-btn" style="flex: 1; background: var(--gray-600);">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration - FIXED ANON KEY
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eHl1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDA2MjU5NzksImV4cCI6MjA1NjIwMTk3OX0.5p3G8EKeg8XrHV5sPWVeqw_Bb9-fzcuxeqwBcB9VrPw';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    persistSession: true,
                    autoRefreshToken: true,
                    detectSessionInUrl: true,
                    flowType: 'pkce'
                }
            });
            console.log('Supabase client initialized successfully');
        } catch (error) {
            console.error('Failed to initialize Supabase:', error);
        }

        // Store email for resend functionality
        let unverifiedEmail = null;

        // Helper Functions
        function showMessage(msg, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
            
            // Auto hide after 5 seconds for success messages
            if (type === 'success') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 5000);
            }
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }

        function showForgotPassword() {
            document.getElementById('forgotModal').style.display = 'flex';
            document.getElementById('resetEmail').value = document.getElementById('email').value;
        }

        function closeForgotModal() {
            document.getElementById('forgotModal').style.display = 'none';
        }

        async function sendResetEmail() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email) {
                alert('Please enter your email address');
                return;
            }

            const btn = event.target;
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending...';

            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });

                if (error) throw error;

                showMessage('Password reset link sent! Check your email.', 'success');
                closeForgotModal();
            } catch (error) {
                console.error('Reset error:', error);
                showMessage('Error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        }

        async function resendVerificationEmail() {
            if (!unverifiedEmail) {
                showMessage('Please enter your email and try again', 'error');
                return;
            }

            const resendLink = document.querySelector('#resendVerification a');
            const originalText = resendLink.textContent;
            resendLink.textContent = 'Sending...';
            resendLink.style.opacity = '0.7';
            resendLink.style.pointerEvents = 'none';

            try {
                const { error } = await supabase.auth.resend({
                    type: 'signup',
                    email: unverifiedEmail,
                    options: {
                        emailRedirectTo: window.location.origin + '/login.html'
                    }
                });

                if (error) throw error;

                showMessage('Verification email resent! Please check your inbox.', 'success');
                resendLink.textContent = 'Sent!';
                
                setTimeout(() => {
                    resendLink.textContent = originalText;
                }, 3000);
            } catch (error) {
                console.error('Resend error:', error);
                showMessage('Error: ' + error.message, 'error');
                resendLink.textContent = originalText;
            } finally {
                resendLink.style.opacity = '1';
                resendLink.style.pointerEvents = 'auto';
            }
        }

        // Check for existing session and URL parameters on page load
        window.addEventListener('DOMContentLoaded', async function() {
            console.log('Login page loaded');
            
            // Check for URL params
            const urlParams = new URLSearchParams(window.location.search);
            
            if (urlParams.get('registered') === 'true') {
                showMessage('Account created! Please check your email to verify your account before logging in.', 'success');
                // Show resend option
                document.getElementById('resendVerification').classList.add('show');
                window.history.replaceState({}, document.title, 'login.html');
            }
            
            if (urlParams.get('verified') === 'true') {
                showMessage('Email verified successfully! You can now log in.', 'success');
                window.history.replaceState({}, document.title, 'login.html');
            }
            
            if (urlParams.get('reset') === 'true') {
                showMessage('Password reset successful! Please login with your new password.', 'success');
                window.history.replaceState({}, document.title, 'login.html');
            }
            
            if (urlParams.get('unverified') === 'true') {
                const email = urlParams.get('email');
                if (email) {
                    unverifiedEmail = email;
                    document.getElementById('email').value = email;
                    document.getElementById('resendVerification').classList.add('show');
                }
                showMessage('Your email is not verified. Check your inbox for the verification link or click below to resend.', 'info');
                window.history.replaceState({}, document.title, 'login.html');
            }
            
            if (urlParams.get('error') === 'email_not_verified') {
                showMessage('Please verify your email first. Check your inbox for the verification link.', 'error');
                document.getElementById('resendVerification').classList.add('show');
                window.history.replaceState({}, document.title, 'login.html');
            }

            // Check for session from email confirmation
            try {
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    const { data: { user } } = await supabase.auth.getUser();
                    
                    if (user && user.email_confirmed_at) {
                        // Email verified - redirect to dashboard
                        const userData = {
                            id: user.id,
                            email: user.email,
                            name: user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0],
                            phone: user.user_metadata?.phone || '',
                            role: 'user',
                            emailVerified: true
                        };
                        localStorage.setItem('trustpay_user', JSON.stringify(userData));
                        window.location.href = 'dashboard.html';
                        return;
                    } else if (user) {
                        // Email not verified
                        unverifiedEmail = user.email;
                        await supabase.auth.signOut();
                        localStorage.removeItem('trustpay_user');
                        document.getElementById('resendVerification').classList.add('show');
                        showMessage('Please verify your email first. Check your inbox for the verification link.', 'info');
                    }
                }
            } catch (e) {
                console.log('Session check error:', e);
            }
        });

        // Login form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            const submitBtn = document.getElementById('submitBtn');
            
            // Basic validation
            if (!email || !email.includes('@')) {
                showMessage('Please enter a valid email address.', 'error');
                document.getElementById('email').focus();
                return;
            }
            
            if (!password || password.length < 6) {
                showMessage('Please enter your password.', 'error');
                document.getElementById('password').focus();
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Signing in...';
            
            try {
                console.log('Attempting login for:', email);
                
                if (!supabase) {
                    throw new Error('Supabase client not initialized');
                }
                
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    console.error('Login error:', error);
                    let errMsg = error.message.toLowerCase();
                    
                    // Handle specific error cases
                    if (errMsg.includes('invalid') || errMsg.includes('wrong') || errMsg.includes('password')) {
                        showMessage('Invalid email or password. Please check your credentials.', 'error');
                    } else if (errMsg.includes('email not confirmed') || errMsg.includes('not verified')) {
                        unverifiedEmail = email;
                        document.getElementById('resendVerification').classList.add('show');
                        showMessage('Email not verified. Check your inbox for the verification link.', 'info');
                    } else if (errMsg.includes('user not found')) {
                        showMessage('No account found with this email. Please sign up first.', 'error');
                    } else if (errMsg.includes('too many')) {
                        showMessage('Too many attempts. Please wait a moment and try again.', 'error');
                    } else {
                        showMessage('Error: ' + error.message, 'error');
                    }
                    
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign In';
                    return;
                }
                
                if (data.user && data.session) {
                    // Check if email is verified
                    if (!data.user.email_confirmed_at) {
                        unverifiedEmail = data.user.email;
                        await supabase.auth.signOut();
                        document.getElementById('resendVerification').classList.add('show');
                        showMessage('Please verify your email first. Check your inbox for the verification link.', 'info');
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'Sign In';
                        return;
                    }
                    
                    // Successful login
                    const userData = {
                        id: data.user.id,
                        email: data.user.email,
                        name: data.user.user_metadata?.full_name || data.user.user_metadata?.name || data.user.email?.split('@')[0],
                        phone: data.user.user_metadata?.phone || '',
                        role: 'user',
                        emailVerified: true
                    };
                    
                    localStorage.setItem('trustpay_user', JSON.stringify(userData));
                    
                    // Store session if remember me is checked
                    if (!remember) {
                        // If not remember me, we can set session expiry
                        // This is handled by Supabase configuration
                    }
                    
                    showMessage('Login successful! Redirecting...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    showMessage('Login failed. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Sign In';
                }
                
            } catch (err) {
                console.error('Login exception:', err);
                showMessage('Connection error. Please check your internet and try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Sign In';
            }
        });

        // Logout function (exposed globally)
        window.logout = async function() {
            await supabase.auth.signOut();
            localStorage.removeItem('trustpay_user');
            window.location.href = 'login.html';
        };

        // Make functions available globally
        window.togglePassword = togglePassword;
        window.showForgotPassword = showForgotPassword;
        window.closeForgotModal = closeForgotModal;
        window.sendResetEmail = sendResetEmail;
        window.resendVerificationEmail = resendVerificationEmail;

        // Add input validation
        document.getElementById('email').addEventListener('input', function() {
            this.classList.remove('error');
        });

        document.getElementById('password').addEventListener('input', function() {
            this.classList.remove('error');
        });

        // Handle Enter key for modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('forgotModal').style.display === 'flex') {
                closeForgotModal();
            }
        });

        // Close modal when clicking outside
        document.getElementById('forgotModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeForgotModal();
            }
        });
    </script>
</body>
</html>
