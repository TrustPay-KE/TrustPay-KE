<!DOCTYPE html>
<html>
<head>
    <title>Corrected TrustPay Setup</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            max-width: 900px; 
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin: 20px 0;
        }
        .step {
            background: rgba(255,255,255,0.1);
            border-left: 4px solid #28a745;
            padding: 20px;
            margin: 15px 0;
            border-radius: 8px;
        }
        .step.completed { border-left-color: #28a745; }
        .step.current { border-left-color: #ffc107; }
        .step.failed { border-left-color: #dc3545; }
        .status { 
            padding: 15px; 
            margin: 10px 0; 
            border-radius: 8px; 
            font-weight: bold;
        }
        .success { background: rgba(40, 167, 69, 0.2); color: #28a745; border: 2px solid #28a745; }
        .error { background: rgba(220, 53, 69, 0.2); color: #dc3545; border: 2px solid #dc3545; }
        .loading { background: rgba(255, 193, 7, 0.2); color: #ffc107; border: 2px solid #ffc107; }
        .info { background: rgba(23, 162, 184, 0.2); color: #17a2b8; border: 2px solid #17a2b8; }
        button { 
            padding: 12px 24px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px 5px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        button:hover { background: #0056b3; transform: translateY(-2px); }
        button:disabled { background: #6c757d; cursor: not-allowed; }
        .log { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 8px; 
            font-family: 'Courier New', monospace; 
            font-size: 12px; 
            max-height: 400px; 
            overflow-y: auto;
            margin: 15px 0;
        }
        h1 { text-align: center; margin-bottom: 30px; }
        h2 { color: #ffd700; }
        .api-info {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Corrected TrustPay Setup</h1>
        
        <div id="status" class="status info">
            📋 Testing Appwrite with corrected API methods...
        </div>
        
        <div class="api-info">
            <h4>🔍 API Information:</h4>
            <div id="api-details">Loading...</div>
        </div>
        
        <div style="text-align: center;">
            <button id="testBtn" onclick="runTests()" disabled>🧪 Run All Tests</button>
        </div>
        
        <div id="log" class="log" style="display: none;"></div>
        
        <div id="steps" style="display: none;">
            <div id="step1" class="step">
                <h3>📡 Step 1: Test Connection</h3>
                <div id="step1-status">⏳ Waiting...</div>
            </div>
            
            <div id="step2" class="step">
                <h3>🗄️ Step 2: Create Database</h3>
                <div id="step2-status">⏳ Waiting...</div>
            </div>
            
            <div id="step3" class="step">
                <h3>📁 Step 3: Create Collections</h3>
                <div id="step3-status">⏳ Waiting...</div>
            </div>
        </div>
        
        <div id="result"></div>
    </div>

    <script>
        let client, databases, storage;
        
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}\n`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function setStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
        
        function showLog() {
            document.getElementById('log').style.display = 'block';
        }
        
        function showSteps() {
            document.getElementById('steps').style.display = 'block';
        }
        
        function updateAPIInfo() {
            const detailsDiv = document.getElementById('api-details');
            
            if (typeof window.Appwrite !== 'undefined') {
                const appwrite = window.Appwrite;
                detailsDiv.innerHTML = `
                    <strong>Appwrite Version:</strong> ${appwrite.VERSION || 'Unknown'}<br>
                    <strong>Available Methods:</strong><br>
                    &nbsp;&nbsp;Client: ${typeof appwrite.Client}<br>
                    &nbsp;&nbsp;Account: ${typeof appwrite.Account}<br>
                    &nbsp;&nbsp;Databases: ${typeof appwrite.Databases}<br>
                    &nbsp;&nbsp;Storage: ${typeof appwrite.Storage}<br>
                    <strong>Client Methods:</strong><br>
                    &nbsp;&nbsp;${Object.getOwnPropertyNames(appwrite.Client.prototype).join(', ')}<br>
                `;
            } else {
                detailsDiv.innerHTML = 'Appwrite object not found';
            }
        }
        
        async function testConnection() {
            const stepDiv = document.getElementById('step1');
            const statusDiv = document.getElementById('step1-status');
            
            stepDiv.className = 'step current';
            statusDiv.innerHTML = '🔄 Testing connection...';
            showLog();
            log('📡 Testing Appwrite connection...');
            
            try {
                // Try different connection methods
                let response;
                
                // Method 1: Try to get account (tests authentication)
                try {
                    const account = new window.Appwrite.Account(client);
                    await account.get();
                    log('✅ Connection successful (account.get() worked)');
                    stepDiv.className = 'step completed';
                    statusDiv.innerHTML = '✅ Connection successful';
                    return true;
                } catch (accountError) {
                    if (accountError.code === 401) {
                        log('✅ Connection successful (401 = not logged in, but API works)');
                        stepDiv.className = 'step completed';
                        statusDiv.innerHTML = '✅ Connection successful';
                        return true;
                    }
                }
                
                // Method 2: Try to list databases (tests permissions)
                try {
                    const databases = new window.Appwrite.Databases(client);
                    const dbList = await databases.list();
                    log('✅ Connection successful (databases.list() worked)');
                    stepDiv.className = 'step completed';
                    statusDiv.innerHTML = '✅ Connection successful';
                    return true;
                } catch (dbError) {
                    log('❌ Database list failed: ' + dbError.message);
                }
                
                // Method 3: Simple health check
                try {
                    // Make a simple API call to test connectivity
                    const healthCheck = await fetch('https://fra.cloud.appwrite.io/v1/health');
                    if (healthCheck.ok) {
                        log('✅ Connection successful (health check passed)');
                        stepDiv.className = 'step completed';
                        statusDiv.innerHTML = '✅ Connection successful';
                        return true;
                    }
                } catch (healthError) {
                    log('❌ Health check failed: ' + healthError.message);
                }
                
                throw new Error('All connection methods failed');
                
            } catch (error) {
                log('❌ Connection failed: ' + error.message);
                stepDiv.className = 'step failed';
                statusDiv.innerHTML = '❌ Connection failed: ' + error.message;
                return false;
            }
        }
        
        async function createDatabase() {
            const stepDiv = document.getElementById('step2');
            const statusDiv = document.getElementById('step2-status');
            
            stepDiv.className = 'step current';
            statusDiv.innerHTML = '🔄 Creating database...';
            
            const DATABASE_ID = 'trustpay_main';
            
            try {
                await databases.get(DATABASE_ID);
                log(`✅ Database ${DATABASE_ID} already exists`);
                stepDiv.className = 'step completed';
                statusDiv.innerHTML = '✅ Database already exists';
                return true;
            } catch (error) {
                if (error.code === 404) {
                    await databases.create(DATABASE_ID, 'TrustPay Main Database');
                    log(`✅ Created database: ${DATABASE_ID}`);
                    stepDiv.className = 'step completed';
                    statusDiv.innerHTML = '✅ Database created successfully';
                    return true;
                } else {
                    log(`❌ Database creation failed: ${error.message}`);
                    stepDiv.className = 'step failed';
                    statusDiv.innerHTML = '❌ Database creation failed';
                    return false;
                }
            }
        }
        
        async function createCollections() {
            const stepDiv = document.getElementById('step3');
            const statusDiv = document.getElementById('step3-status');
            
            stepDiv.className = 'step current';
            statusDiv.innerHTML = '🔄 Creating collections...';
            
            const DATABASE_ID = 'trustpay_main';
            const COLLECTIONS = {
                users: 'users',
                escrows: 'escrows', 
                transactions: 'transactions',
                disputes: 'disputes',
                kyc: 'kyc',
                notifications: 'notifications',
                invites: 'invites'
            };
            
            const collectionNames = {
                users: 'Users',
                escrows: 'Escrows',
                transactions: 'Transactions', 
                disputes: 'Disputes',
                kyc: 'KYC Applications',
                notifications: 'Notifications',
                invites: 'Invites'
            };
            
            let success = true;
            
            for (const [collectionId, collectionName] of Object.entries(collectionNames)) {
                try {
                    log(`📁 Creating collection: ${collectionName}`);
                    await databases.get(DATABASE_ID, collectionId);
                    log(`✅ Collection ${collectionName} already exists`);
                } catch (error) {
                    if (error.code === 404) {
                        await databases.create(DATABASE_ID, collectionId, collectionName);
                        log(`✅ Created collection: ${collectionName}`);
                    } else {
                        log(`⚠️ Error with ${collectionName}: ${error.message}`);
                        success = false;
                    }
                }
            }
            
            if (success) {
                stepDiv.className = 'step completed';
                statusDiv.innerHTML = '✅ All collections created successfully';
            } else {
                stepDiv.className = 'step failed';
                statusDiv.innerHTML = '❌ Some collections failed to create';
            }
            
            return success;
        }
        
        async function runTests() {
            setStatus('🔄 Running corrected tests...', 'loading');
            showLog();
            showSteps();
            
            const testBtn = document.getElementById('testBtn');
            
            testBtn.disabled = true;
            
            log('🚀 Starting corrected TrustPay tests...');
            
            try {
                // Initialize client
                client = new window.Appwrite.Client()
                    .setEndpoint("https://fra.cloud.appwrite.io/v1")
                    .setProject("69c165c7003cae4214fe");
                
                // Initialize databases and storage
                databases = new window.Appwrite.Databases(client);
                storage = new window.Appwrite.Storage(client);
                
                // Update API info
                updateAPIInfo();
                
                // Test Connection
                const connectionOk = await testConnection();
                if (!connectionOk) {
                    throw new Error('Connection test failed');
                }
                
                // Test Database Creation
                const dbOk = await createDatabase();
                if (!dbOk) {
                    throw new Error('Database creation failed');
                }
                
                // Test Collection Creation
                const collectionsOk = await createCollections();
                if (!collectionsOk) {
                    throw new Error('Collection creation failed');
                }
                
                // Success
                setStatus('🎉 ALL TESTS PASSED!', 'success');
                
                document.getElementById('result').innerHTML = `
                    <div class="container">
                        <h2>🎉 TrustPay Backend Setup Complete!</h2>
                        <h3>✅ What's Been Created:</h3>
                        <ul style="list-style: none; padding: 0;">
                            <li style="background: rgba(255,255,255,0.1); margin: 8px 0; padding: 10px; border-radius: 5px;">✅ Appwrite SDK Working</li>
                            <li style="background: rgba(255,255,255,0.1); margin: 8px 0; padding: 10px; border-radius: 5px;">✅ Connection Working</li>
                            <li style="background: rgba(255,255,255,0.1); margin: 8px 0; padding: 10px; border-radius: 5px;">✅ Database Created</li>
                            <li style="background: rgba(255,255,255,0.1); margin: 8px 0; padding: 10px; border-radius: 5px;">✅ Collections Created</li>
                        </ul>
                        <h3>🎯 Next Steps:</h3>
                        <ol>
                            <li>📦 Create storage buckets manually in Appwrite Console</li>
                            <li>🔐 Test user registration and login</li>
                            <li>💼 Create your first escrow</li>
                        </ol>
                        <div style="text-align: center;">
                            <button onclick="window.location.href='login-integrated.html'" style="background: #28a745; font-size: 18px; padding: 15px 30px;">
                                🚀 Test Live Application
                            </button>
                        </div>
                    </div>
                `;
                
            } catch (error) {
                log('❌ Tests failed: ' + error.message);
                setStatus('❌ Tests failed: ' + error.message, 'error');
            } finally {
                testBtn.disabled = false;
            }
        }
        
        // Initialize on page load
        window.addEventListener('load', () => {
            setTimeout(() => {
                log('🌍 Page loaded - Testing corrected Appwrite API...');
                setStatus('📋 Testing corrected Appwrite API...', 'info');
                
                // Update API info
                updateAPIInfo();
                
                // Enable test button after delay
                setTimeout(() => {
                    document.getElementById('testBtn').disabled = false;
                }, 2000);
                
            }, 1000);
        });
    </script>
    
    <!-- Load Appwrite SDK v10.0.0 (stable version) -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@10.0.0"></script>
</body>
</html>
