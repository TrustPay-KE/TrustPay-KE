<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup TrustPay Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .container { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TrustPay Database Setup</h1>
        <p>This will create the necessary tables for TrustPay in your Supabase database.</p>
        
        <div id="status" class="status info">Ready to setup database...</div>
        <button onclick="setupDatabase()">Setup Database</button>
        <button onclick="testConnection()">Test Connection</button>
        <button onclick="clearDatabase()" class="hidden" id="clearBtn">Clear Database</button>
        
        <div id="results" class="hidden">
            <h3>Setup Results:</h3>
            <pre id="output"></pre>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';
        
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        function showResults(results) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('output').textContent = results;
        }
        
        async function testConnection() {
            showStatus('Testing connection...', 'info');
            try {
                const { data, error } = await supabase.from('users').select('count').limit(1);
                if (error && error.code === 'PGRST116') {
                    showStatus('Connection successful but tables do not exist. Click "Setup Database" to create them.', 'info');
                } else if (error) {
                    showStatus(`Connection error: ${error.message}`, 'error');
                    showResults(JSON.stringify(error, null, 2));
                } else {
                    showStatus('Connection successful! Database is ready.', 'success');
                }
            } catch (err) {
                showStatus(`Connection failed: ${err.message}`, 'error');
                showResults(JSON.stringify(err, null, 2));
            }
        }
        
        async function setupDatabase() {
            showStatus('Setting up database...', 'info');
            const results = [];
            
            try {
                // Create users table
                const { error: usersError } = await supabase.rpc('create_users_table');
                if (usersError) {
                    results.push(`Users table error: ${usersError.message}`);
                } else {
                    results.push('✅ Users table created successfully');
                }
                
                // Create escrows table
                const { error: escrowsError } = await supabase.rpc('create_escrows_table');
                if (escrowsError) {
                    results.push(`Escrows table error: ${escrowsError.message}`);
                } else {
                    results.push('✅ Escrows table created successfully');
                }
                
                // Create transactions table
                const { error: transactionsError } = await supabase.rpc('create_transactions_table');
                if (transactionsError) {
                    results.push(`Transactions table error: ${transactionsError.message}`);
                } else {
                    results.push('✅ Transactions table created successfully');
                }
                
                // Create disputes table
                const { error: disputesError } = await supabase.rpc('create_disputes_table');
                if (disputesError) {
                    results.push(`Disputes table error: ${disputesError.message}`);
                } else {
                    results.push('✅ Disputes table created successfully');
                }
                
                // Create kyc table
                const { error: kycError } = await supabase.rpc('create_kyc_table');
                if (kycError) {
                    results.push(`KYC table error: ${kycError.message}`);
                } else {
                    results.push('✅ KYC table created successfully');
                }
                
                // Create notifications table
                const { error: notificationsError } = await supabase.rpc('create_notifications_table');
                if (notificationsError) {
                    results.push(`Notifications table error: ${notificationsError.message}`);
                } else {
                    results.push('✅ Notifications table created successfully');
                }
                
                // Create invites table
                const { error: invitesError } = await supabase.rpc('create_invites_table');
                if (invitesError) {
                    results.push(`Invites table error: ${invitesError.message}`);
                } else {
                    results.push('✅ Invites table created successfully');
                }
                
                showResults(results.join('\n'));
                showStatus('Database setup complete!', 'success');
                document.getElementById('clearBtn').classList.remove('hidden');
                
            } catch (err) {
                results.push(`Setup failed: ${err.message}`);
                showResults(results.join('\n'));
                showStatus('Database setup failed!', 'error');
            }
        }
        
        async function clearDatabase() {
            if (!confirm('This will delete ALL data in the database. Are you sure?')) {
                return;
            }
            
            showStatus('Clearing database...', 'info');
            const results = [];
            
            try {
                const tables = ['users', 'escrows', 'transactions', 'disputes', 'kyc', 'notifications', 'invites'];
                
                for (const table of tables) {
                    const { error } = await supabase.from(table).delete().neq('id', '00000000-0000-0000-0000-000000000000');
                    if (error) {
                        results.push(`Failed to clear ${table}: ${error.message}`);
                    } else {
                        results.push(`✅ Cleared ${table} table`);
                    }
                }
                
                showResults(results.join('\n'));
                showStatus('Database cleared!', 'success');
                
            } catch (err) {
                results.push(`Clear failed: ${err.message}`);
                showResults(results.join('\n'));
                showStatus('Database clear failed!', 'error');
            }
        }
        
        // Test connection on load
        testConnection();
    </script>
</body>
</html>
