    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0d9488; --primary-dark: #0f766e; --gray-200: #e5e7eb; --gray-600: #4b5563; --gray-900: #111827; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a, #1e293b); padding: 2rem; }
        .container { width: 100%; max-width: 420px; }
        .card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), #9333ea); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.4rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-600); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.5; }
        .form-input { width: 100%; padding: 0.875rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 1rem; }
        .submit-btn:disabled { opacity: 0.6; }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.9rem; }
        .message.success { background: #d1fae5; color: #065f46; }
        .message.error { background: #fee2e2; color: #991b1b; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .link { text-align: center; margin-top: 1.5rem; color: var(--gray-600); font-size: 0.9rem; }
        .link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .steps { background: #f9fafb; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--gray-600); }
        .steps p { margin: 0.3rem 0; display: flex; align-items: center; gap: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            <h1>Forgot Password?</h1>
            <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
            <div class="steps">
                <p>✓ Enter your email below</p>
                <p>✓ Check email for reset link</p>
                <p>✓ Click link to create new password</p>
            </div>
            <div id="message" class="message"></div>
            <form id="resetForm" autocomplete="on">
                <input type="email" class="form-input" id="email" placeholder="your@email.com" autocomplete="email" required>
                <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
            </form>
            <p class="link">Remember password? <a href="login.html">Sign in</a></p>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showMessage(msg, type) {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
        }
        
        // For testing on GitHub Pages
        const RESET_URL = window.location.hostname === 'trustpay-ke.github.io' 
            ? 'https://trustpay-ke.github.io/TrustPay-KE/reset-password.html'
            : 'https://trustpay.co.ke/reset-password.html';
        
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const btn = document.getElementById('submitBtn');
            
            if (!email || !email.includes('@')) {
                showMessage('Please enter a valid email.', 'error');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Sending...';
            
            try {
                console.log('Sending password reset to:', email);
                
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: RESET_URL
                });
                
                console.log('Reset response:', { error });
                
                if (error) {
                    console.error('Reset error:', error);
                    if (error.message.includes('User not found')) {
                        showMessage('No account with this email. Sign up first.', 'error');
                    } else {
                        showMessage('Error: ' + error.message, 'error');
                    }
                    btn.disabled = false;
                    btn.textContent = 'Send Reset Link';
                    return;
                }
                
                showMessage('✓ Reset link sent! Check your email (and spam folder).', 'success');
                btn.textContent = '✓ Sent!';
                document.getElementById('resetForm').style.display = 'none';
            } catch (err) {
                console.error('Reset exception:', err);
                showMessage('Error. Try again.', 'error');
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>
