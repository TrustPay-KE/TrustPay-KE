<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | TrustPay KE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { color: #0d9488; margin-bottom: 1rem; }
        p { color: #4b5563; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: #0d9488;
        }
        button {
            width: 100%;
            padding: 1rem;
            background: #0d9488;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover {
            background: #0f766e;
        }
        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .success { background: #d1fae5; color: #065f46; display: block; }
        .error { background: #fee2e2; color: #991b1b; display: block; }
        .back { text-align: center; margin-top: 1rem; }
        .back a { color: #0d9488; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Reset Password</h1>
        <p>Enter your email address and we'll send you a password reset link.</p>
        <div id="message" class="message"></div>
        <input type="email" id="email" placeholder="your@email.com">
        <button onclick="resetPassword()">Send Reset Link</button>
        <div class="back"><a href="login.html">← Back to Login</a></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function resetPassword() {
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('message');
            
            if (!email) {
                msg.textContent = 'Please enter your email';
                msg.className = 'message error';
                return;
            }

            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/reset-password.html'
            });

            if (error) {
                msg.textContent = error.message;
                msg.className = 'message error';
            } else {
                msg.textContent = '✓ Reset link sent! Check your email.';
                msg.className = 'message success';
            }
        }
    </script>
</body>
</html>
