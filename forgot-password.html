<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | TrustPay KE</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --accent: #9333ea;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-900: #111827;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            position: relative;
            overflow: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(13, 148, 136, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 51, 234, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(13, 148, 136, 0.1) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(2%, 2%) rotate(1deg); }
            66% { transform: translate(-1%, 1%) rotate(-1deg); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: rgba(13, 148, 136, 0.3);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: rgba(147, 51, 234, 0.25);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: rgba(13, 148, 136, 0.2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -20px) scale(1.05); }
            50% { transform: translate(-10px, 30px) scale(0.95); }
            75% { transform: translate(-30px, -10px) scale(1.02); }
        }

        /* Floating Shapes */
        .shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .shape {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: shapeFloat 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 60px;
            height: 60px;
            top: 15%;
            left: 20%;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 50px;
            height: 50px;
            top: 65%;
            right: 20%;
            border-radius: 50%;
            animation-delay: -7s;
        }

        .shape-3 {
            width: 70px;
            height: 70px;
            bottom: 20%;
            left: 15%;
            border-radius: 20% 80% 20% 80% / 80% 20% 80% 20%;
            animation-delay: -12s;
        }

        @keyframes shapeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            50% { transform: translateY(-20px) rotate(180deg); opacity: 0.6; }
        }

        /* Container */
        .reset-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 0 1rem;
        }

        .reset-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2.5rem;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: boxEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes boxEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 800;
            font-size: 1.5rem;
            color: white;
            text-decoration: none;
            margin-bottom: 1.5rem;
            animation: logoEnter 0.6s ease forwards;
            animation-delay: 0.2s;
            opacity: 0;
            transform: scale(0.8);
        }

        @keyframes logoEnter {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(13, 148, 136, 0.3);
        }

        .logo-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .logo span {
            color: var(--primary);
        }

        .reset-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.3s;
            opacity: 0;
        }

        .reset-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.4s;
            opacity: 0;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(10px);
            }
        }

        /* Steps Indicator */
        .steps-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.45s;
            opacity: 0;
        }

        .step {
            width: 80px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .step.active {
            background: var(--primary);
        }

        .step.completed {
            background: var(--success);
        }

        /* Form Section */
        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .form-group:nth-child(1) { animation-delay: 0.5s; }
        .form-group:nth-child(2) { animation-delay: 0.55s; }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 0.5rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1rem;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .input-wrapper input:focus + i {
            color: var(--primary);
        }

        /* OTP Input */
        .otp-container {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin: 2rem 0;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            transition: all 0.3s;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .otp-input.filled {
            border-color: var(--primary);
            background: rgba(13, 148, 136, 0.1);
        }

        /* Method Selection */
        .method-selection {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.5s;
            opacity: 0;
        }

        .method-btn {
            flex: 1;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .method-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .method-btn.selected {
            border-color: var(--primary);
            background: rgba(13, 148, 136, 0.1);
        }

        .method-btn i {
            font-size: 1.5rem;
            color: var(--primary);
        }

        .method-btn span {
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* Resend Code */
        .resend-code {
            text-align: center;
            margin-top: 1rem;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.7s;
            opacity: 0;
        }

        .resend-code p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
        }

        .resend-code button {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        .resend-code button:hover {
            color: #2dd4bf;
        }

        .resend-code button:disabled {
            color: rgba(255, 255, 255, 0.3);
            cursor: not-allowed;
        }

        .countdown {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.875rem;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.6s;
            opacity: 0;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(13, 148, 136, 0.4);
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Message */
        .message {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
            animation: shake 0.5s ease;
            text-align: center;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            display: block;
        }

        .message.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            display: block;
        }

        /* Back Link */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
            animation: fadeInUp 0.6s ease forwards;
            animation-delay: 0.8s;
            opacity: 0;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        /* Back to Home */
        .back-home {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.3s;
            animation: fadeIn 0.5s ease forwards;
        }

        .back-home:hover {
            color: white;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .reset-box {
                padding: 2rem 1.5rem;
            }

            .method-selection {
                flex-direction: column;
            }

            .otp-input {
                width: 42px;
                height: 54px;
                font-size: 1.25rem;
            }

            .otp-container {
                gap: 0.5rem;
            }

            .back-home {
                top: 1rem;
                left: 1rem;
            }
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            animation: fadeIn 0.5s ease forwards;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .theme-toggle .sun { display: none; }
        .theme-toggle .moon { display: block; }

        body.light-mode .theme-toggle .sun { display: block; }
        body.light-mode .theme-toggle .moon { display: none; }

        body.light-mode {
            background: #f5f5f5;
        }

        body.light-mode .reset-box {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-mode .reset-header h1,
        body.light-mode .logo {
            color: #111827;
        }

        body.light-mode .reset-header p,
        body.light-mode .form-group label,
        body.light-mode .input-wrapper input,
        body.light-mode #section2 p {
            color: #4b5563;
        }

        body.light-mode .input-wrapper input {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111827;
        }

        body.light-mode .input-wrapper input::placeholder {
            color: rgba(0, 0, 0, 0.3);
        }

        body.light-mode .input-wrapper i {
            color: rgba(0, 0, 0, 0.4);
        }

        body.light-mode .method-btn {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111827;
        }

        body.light-mode .otp-input {
            background: rgba(0, 0, 0, 0.05);
            border-color: rgba(0, 0, 0, 0.1);
            color: #111827;
        }

        body.light-mode .back-home {
            color: #4b5563;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Back to Home -->
    <a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
        Back to Home
    </a>

    <!-- Theme Toggle -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="moon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>

    <div class="reset-container">
        <div class="reset-box">
            <div class="reset-header">
                <a href="index.html" class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    </div>
                    TrustPay <span>KE</span>
                </a>
                <h1 id="headerTitle">Reset Password</h1>
                <p id="headerDesc">Enter your email or phone to receive a verification code</p>
            </div>

            <!-- Steps Indicator -->
            <div class="steps-indicator">
                <div class="step active" id="step1"></div>
                <div class="step" id="step2"></div>
                <div class="step" id="step3"></div>
            </div>

            <div class="message" id="message"></div>

            <!-- Step 1: Enter Email/Phone -->
            <div class="form-section active" id="section1">
                <div class="method-selection">
                    <button type="button" class="method-btn selected" onclick="selectMethod('email')" id="emailBtn">
                        <i class="fas fa-envelope"></i>
                        <span>Email</span>
                    </button>
                    <button type="button" class="method-btn" onclick="selectMethod('phone')" id="phoneBtn">
                        <i class="fas fa-phone"></i>
                        <span>Phone</span>
                    </button>
                </div>

                <form id="resetForm">
                    <div class="form-group">
                        <label id="inputLabel">Email Address</label>
                        <div class="input-wrapper">
                            <input type="text" id="resetInput" placeholder="Enter your email" required>
                            <i class="fas fa-envelope" id="inputIcon"></i>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn1">Send Code</button>
                </form>
            </div>

            <!-- Step 2: Enter OTP -->
            <div class="form-section" id="section2">
                <p style="text-align: center; color: rgba(255,255,255,0.6); margin-bottom: 1rem; font-size: 0.95rem;">
                    Enter the 6-digit code sent to <span id="sendTo" style="color: var(--primary); font-weight: 500;"></span>
                </p>

                <div class="otp-container">
                    <input type="text" class="otp-input" maxlength="1" data-index="0">
                    <input type="text" class="otp-input" maxlength="1" data-index="1">
                    <input type="text" class="otp-input" maxlength="1" data-index="2">
                    <input type="text" class="otp-input" maxlength="1" data-index="3">
                    <input type="text" class="otp-input" maxlength="1" data-index="4">
                    <input type="text" class="otp-input" maxlength="1" data-index="5">
                </div>

                <button type="button" class="submit-btn" id="submitBtn2" onclick="verifyOTP()">Verify Code</button>

                <div class="resend-code">
                    <p>Didn't receive the code?</p>
                    <button id="resendBtn" onclick="resendCode()" disabled>Resend Code</button>
                    <span class="countdown" id="countdown"></span>
                </div>
            </div>

            <!-- Step 3: New Password -->
            <div class="form-section" id="section3">
                <form id="newPasswordForm">
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="newPassword" placeholder="Enter new password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirmNewPassword" placeholder="Confirm new password" required>
                            <i class="fas fa-lock"></i>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn3">Reset Password</button>
                </form>
            </div>

            <div class="back-link">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        let currentMethod = 'email';
        let resetValue = '';
        let countdownInterval;

        function selectMethod(method) {
            currentMethod = method;
            
            document.getElementById('emailBtn').classList.toggle('selected', method === 'email');
            document.getElementById('phoneBtn').classList.toggle('selected', method === 'phone');
            
            const input = document.getElementById('resetInput');
            const icon = document.getElementById('inputIcon');
            const label = document.getElementById('inputLabel');
            
            if (method === 'email') {
                input.type = 'email';
                input.placeholder = 'Enter your email';
                icon.className = 'fas fa-envelope';
                label.textContent = 'Email Address';
            } else {
                input.type = 'tel';
                input.placeholder = '0712 345 678';
                icon.className = 'fas fa-phone';
                label.textContent = 'Phone Number';
            }
            
            input.value = '';
        }

        // OTP Input Handling
        const otpInputs = document.querySelectorAll('.otp-input');
        
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function(e) {
                if (this.value.length === 1) {
                    this.classList.add('filled');
                    if (index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }
                }
                
                // Check if all filled
                const allFilled = Array.from(otpInputs).every(i => i.value.length === 1);
                if (allFilled) {
                    verifyOTP();
                }
            });
            
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value.length === 0 && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
            
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text');
                if (/^\d{6}$/.test(pastedData)) {
                    pastedData.split('').forEach((digit, i) => {
                        otpInputs[i].value = digit;
                        otpInputs[i].classList.add('filled');
                    });
                    otpInputs[5].focus();
                    verifyOTP();
                }
            });
        });

        // Send Code
        document.getElementById('resetForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            resetValue = document.getElementById('resetInput').value;
            
            if (!resetValue) {
                showMessage('Please enter your ' + currentMethod, 'error');
                return;
            }
            
            // Validate based on method
            if (currentMethod === 'email') {
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(resetValue)) {
                    showMessage('Please enter a valid email address', 'error');
                    return;
                }
            } else {
                if (!/^(\+254|0)[1-9]\d{8}$/.test(resetValue.replace(/\s/g, ''))) {
                    showMessage('Please enter a valid Kenyan phone number', 'error');
                    return;
                }
            }
            
            // Show OTP section
            document.getElementById('sendTo').textContent = resetValue;
            showSection(2);
            startCountdown();
        });

        function verifyOTP() {
            const otp = Array.from(otpInputs).map(i => i.value).join('');
            
            if (otp.length !== 6) {
                showMessage('Please enter the complete 6-digit code', 'error');
                return;
            }
            
            if (/^\d{6}$/.test(otp)) {
                showMessage('Code verified successfully!', 'success');
                setTimeout(() => {
                    showSection(3);
                }, 1000);
            } else {
                showMessage('Invalid code. Please try again.', 'error');
            }
        }

        function resendCode() {
            showMessage('Code resent successfully!', 'success');
            startCountdown();
        }

        function startCountdown() {
            let countdown = 60;
            const countdownEl = document.getElementById('countdown');
            const resendBtn = document.getElementById('resendBtn');
            
            resendBtn.disabled = true;
            countdownEl.textContent = `(${countdown}s)`;
            
            clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                countdown--;
                countdownEl.textContent = `(${countdown}s)`;
                
                if (countdown <= 0) {
                    clearInterval(countdownInterval);
                    countdownEl.textContent = '';
                    resendBtn.disabled = false;
                }
            }, 1000);
        }

        function showSection(sectionNum) {
            // Update steps
            document.querySelectorAll('.step').forEach((step, i) => {
                step.classList.remove('active', 'completed');
                if (i + 1 < sectionNum) {
                    step.classList.add('completed');
                } else if (i + 1 === sectionNum) {
                    step.classList.add('active');
                }
            });
            
            // Update sections
            document.querySelectorAll('.form-section').forEach((section, i) => {
                section.classList.remove('active');
                if (i + 1 === sectionNum) {
                    section.classList.add('active');
                }
            });
            
            // Update header
            const titles = [
                'Reset Password',
                'Verify Code',
                'New Password'
            ];
            const descs = [
                'Enter your email or phone to receive a verification code',
                'Enter the 6-digit code we sent you',
                'Create a strong new password'
            ];
            
            document.getElementById('headerTitle').textContent = titles[sectionNum - 1];
            document.getElementById('headerDesc').textContent = descs[sectionNum - 1];
        }

        function showMessage(text, type) {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = 'message ' + type;
            
            setTimeout(() => {
                message.className = 'message';
            }, 5000);
        }

        // New Password Form
        document.getElementById('newPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmNewPassword').value;
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }
            
            // Success
            const btn = document.getElementById('submitBtn3');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            
            setTimeout(() => {
                showMessage('Password reset successfully!', 'success');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            }, 1500);
        });

        // Theme Toggle
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        
        if (savedTheme === 'light') {
            document.body.classList.add('light-mode');
        }

        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        });
    </script>
</body>
</html>
