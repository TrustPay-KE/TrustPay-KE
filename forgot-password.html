<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | TrustPay KE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>

<style>

body{

font-family:Arial,Helvetica,sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:#0f172a;

margin:0;

}

.card{

background:white;

padding:30px;

border-radius:15px;

width:100%;
max-width:420px;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}

h1{

text-align:center;

margin-bottom:5px;

}

.subtitle{

text-align:center;

color:#555;

font-size:14px;

margin-bottom:20px;

}

input{

width:100%;

padding:12px;

border-radius:8px;

border:1px solid #ccc;

margin-bottom:15px;

font-size:15px;

}

button{

width:100%;

padding:13px;

background:#0d9488;

border:none;

color:white;

font-weight:bold;

border-radius:8px;

cursor:pointer;

}

button:disabled{

opacity:.6;

cursor:not-allowed;

}

.message{

display:none;

padding:12px;

border-radius:8px;

margin-bottom:15px;

font-size:14px;

}

.success{

display:block;

background:#d1fae5;

color:#065f46;

}

.error{

display:block;

background:#fee2e2;

color:#991b1b;

}

.spinner{

border:3px solid rgba(255,255,255,.3);

border-top:3px solid white;

border-radius:50%;

width:16px;

height:16px;

display:inline-block;

animation:spin 1s linear infinite;

margin-right:5px;

}

@keyframes spin{

to{transform:rotate(360deg)}

}

.back{

text-align:center;

margin-top:15px;

}

a{

color:#0d9488;

text-decoration:none;

}

</style>

</head>

<body>

<div class="card">

<h1>Forgot Password</h1>

<p class="subtitle">

Enter your email to receive password reset link.

</p>

<div id="message" class="message"></div>

<form id="resetForm">

<input
type="email"
id="email"
placeholder="you@example.com"
required>

<button id="submitBtn">

Send Reset Link

</button>

</form>

<div class="back">

<a href="login.html">

Back to Login

</a>

</div>

</div>


<script>


// SUPABASE CONFIG

const SUPABASE_URL =
'https://gifgxyxuzugbkqfpnxxb.supabase.co';

const SUPABASE_KEY =
'sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu';

const supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


// MESSAGE SYSTEM

function showMessage(msg,type){

const box =
document.getElementById('message');

box.textContent=msg;

box.className='message '+type;

}



// RESET PASSWORD

document
.getElementById('resetForm')

.addEventListener(

'submit',

async(e)=>{

e.preventDefault();

const email =
document
.getElementById('email')
.value
.trim()
.toLowerCase();

const btn =
document
.getElementById('submitBtn');


// EMAIL CHECK

if(!email.includes('@')){

showMessage(

'Enter valid email address',

'error'

);

return;

}


// LOADING

btn.disabled=true;

btn.innerHTML=
'<span class="spinner"></span>Sending...';


try{


// NETWORK TIMEOUT

const timeout =
new Promise((_,reject)=>

setTimeout(

()=>reject(
new Error('timeout')
),

15000

)

);


// SEND RESET

const request =
supabaseClient.auth
.resetPasswordForEmail(

email,

{

redirectTo:

'https://trustpay-ke.github.io/TrustPay-KE/reset-password.html'

}

);


// RACE

const {error} =
await Promise.race([
request,
timeout
]);


// ERROR

if(error){

console.log(error);

showMessage(

'Unable to send reset email. Try again.',

'error'

);

btn.disabled=false;

btn.textContent=
'Send Reset Link';

return;

}


// SUCCESS

showMessage(

'✅ If account exists, reset email sent. Check Inbox or Spam.',

'success'

);


// hide form

document
.getElementById('resetForm')
.style.display='none';

btn.textContent='Sent';


}catch(err){

console.log(err);

if(err.message==='timeout'){

showMessage(

'Internet slow. Try again.',

'error'

);

}else{

showMessage(

'Connection error.',

'error'

);

}

btn.disabled=false;

btn.textContent=
'Send Reset Link';

}

});

</script>

</body>

</html>
