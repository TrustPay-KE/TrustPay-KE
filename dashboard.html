<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TrustPay KE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0d9488; --primary-dark: #0f766e; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-600: #4b5563; --gray-900: #111827; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); min-height: 100vh; padding: 2rem; }
        .container { max-width: 1200px; margin: 0 auto; }
        .dashboard-card { background: white; border-radius: 20px; padding: 2rem; box-shadow: 0 25px 50px rgba(0,0,0,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--gray-200); }
        .logo { display: flex; align-items: center; gap: 0.5rem; }
        .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--primary), #9333ea); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        .logo-text { font-size: 1.25rem; font-weight: 700; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .logout-btn:hover { background: #dc2626; transform: translateY(-2px); }
        .welcome-section { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .welcome-section h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--gray-50); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--gray-200); }
        .stat-card h3 { color: var(--gray-600); font-size: 0.875rem; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--gray-900); }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .info-card { background: var(--gray-50); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--gray-200); }
        .info-card h2 { font-size: 1.25rem; margin-bottom: 1rem; color: var(--gray-900); }
        .info-item { display: flex; justify-content: space-between; padding: 0.75rem 0; border-bottom: 1px solid var(--gray-200); }
        .info-item:last-child { border-bottom: none; }
        .label { color: var(--gray-600); font-weight: 500; }
        .value { color: var(--gray-900); font-weight: 600; }
        @media (max-width: 768px) {
            .info-grid { grid-template-columns: 1fr; }
            .welcome-section h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="dashboard-card">
            <div class="header">
                <div class="logo">
                    <div class="logo-icon">TP</div>
                    <span class="logo-text">TrustPay <span>KE</span></span>
                </div>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>

            <div class="welcome-section" id="welcomeSection">
                <h1>Welcome back, <span id="userName">User</span>!</h1>
                <p>Your trusted escrow platform in Kenya</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Account Status</h3>
                    <div class="value" id="accountStatus">Active</div>
                </div>
                <div class="stat-card">
                    <h3>Member Since</h3>
                    <div class="value" id="memberSince">Loading...</div>
                </div>
                <div class="stat-card">
                    <h3>Email Status</h3>
                    <div class="value" id="emailStatus">Verified</div>
                </div>
            </div>

            <div class="info-grid">
                <div class="info-card">
                    <h2>Profile Information</h2>
                    <div class="info-item">
                        <span class="label">Full Name</span>
                        <span class="value" id="profileName">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Email Address</span>
                        <span class="value" id="profileEmail">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Phone Number</span>
                        <span class="value" id="profilePhone">-</span>
                    </div>
                </div>

                <div class="info-card">
                    <h2>Account Details</h2>
                    <div class="info-item">
                        <span class="label">User ID</span>
                        <span class="value" id="userId">-</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Account Type</span>
                        <span class="value">Standard</span>
                    </div>
                    <div class="info-item">
                        <span class="label">Last Login</span>
                        <span class="value" id="lastLogin">Today</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check if user is logged in
        const userData = localStorage.getItem('trustpay_user');
        
        if (!userData) {
            window.location.href = 'login.html';
        } else {
            try {
                const user = JSON.parse(userData);
                
                // Update UI with user data
                document.getElementById('userName').textContent = user.name || 'User';
                document.getElementById('profileName').textContent = user.name || '-';
                document.getElementById('profileEmail').textContent = user.email || '-';
                document.getElementById('profilePhone').textContent = user.phone || 'Not set';
                document.getElementById('userId').textContent = user.id ? user.id.substring(0, 8) + '...' : '-';
                
                // Format date
                const date = new Date();
                document.getElementById('memberSince').textContent = date.toLocaleDateString('en-KE', { 
                    month: 'short', 
                    year: 'numeric' 
                });
                
            } catch (e) {
                console.error('Error parsing user data:', e);
                localStorage.removeItem('trustpay_user');
                window.location.href = 'login.html';
            }
        }

        function logout() {
            localStorage.removeItem('trustpay_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
