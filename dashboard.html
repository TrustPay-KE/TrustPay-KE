// ============================================
// SAFE JSON PARSE UTILITY
// ============================================
function safeParse(data) {
    if (!data) return null;
    try {
        return JSON.parse(data);
    } catch (e) {
        console.warn('JSON parse error:', e);
        return null;
    }
}

// ============================================
// SHOW MESSAGE UTILITY
// ============================================
function showMessage(message, type = 'info') {
    // Check if message container exists, if not create it
    let msgContainer = document.getElementById('messageContainer');
    if (!msgContainer) {
        msgContainer = document.createElement('div');
        msgContainer.id = 'messageContainer';
        msgContainer.style.position = 'fixed';
        msgContainer.style.top = '20px';
        msgContainer.style.right = '20px';
        msgContainer.style.zIndex = '9999';
        document.body.appendChild(msgContainer);
    }

    const msgEl = document.createElement('div');
    msgEl.className = `message ${type}`;
    msgEl.textContent = message;
    msgEl.style.margin = '10px';
    msgEl.style.padding = '15px 20px';
    msgEl.style.borderRadius = '8px';
    msgEl.style.boxShadow = '0 4px 12px rgba(0,0,0,0.15)';
    msgEl.style.animation = 'slideIn 0.3s ease';
    
    // Style based on type
    if (type === 'success') {
        msgEl.style.background = '#d1fae5';
        msgEl.style.color = '#065f46';
        msgEl.style.borderLeft = '4px solid #10b981';
    } else if (type === 'error') {
        msgEl.style.background = '#fee2e2';
        msgEl.style.color = '#991b1b';
        msgEl.style.borderLeft = '4px solid #ef4444';
    } else {
        msgEl.style.background = '#e0f2fe';
        msgEl.style.color = '#0369a1';
        msgEl.style.borderLeft = '4px solid #0ea5e9';
    }

    msgContainer.appendChild(msgEl);

    // Auto remove after 5 seconds
    setTimeout(() => {
        msgEl.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => {
            if (msgContainer.contains(msgEl)) {
                msgContainer.removeChild(msgEl);
            }
        }, 300);
    }, 5000);
}

// ============================================
// INITIALIZATION
// ============================================
async function init() {
    try {
        console.log('Initializing dashboard...');
        
        // Check if supabase client exists
        if (!supabaseClient) {
            throw new Error('Supabase client not initialized');
        }

        // Get current session
        const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
        
        if (sessionError) {
            console.error('Session error:', sessionError);
            throw sessionError;
        }

        // Get stored user data
        let storedUser = safeParse(localStorage.getItem("trustpay_user"));

        // Debug logging
        console.log('Session:', session);
        console.log('Stored user:', storedUser);

        // No valid session or stored user - redirect to login
        if (!session?.user && !storedUser) {
            console.log('No user found, redirecting to login');
            window.location.replace("login.html");
            return;
        }

        // Check email verification if session exists
        if (session?.user) {
            // Check if email is confirmed
            const { data: { user }, error: userError } = await supabaseClient.auth.getUser();
            
            if (userError) {
                console.error('User fetch error:', userError);
                throw userError;
            }

            if (!user?.email_confirmed_at) {
                // Email not verified - sign out and redirect
                console.log('Email not verified');
                localStorage.removeItem("trustpay_user");
                await supabaseClient.auth.signOut();
                window.location.replace("login.html?unverified=true&email=" + encodeURIComponent(user?.email || ''));
                return;
            }

            // Build user object from session
            currentUser = {
                id: user.id,
                email: user.email,
                name: user.user_metadata?.full_name || user.user_metadata?.name || storedUser?.name || user.email?.split('@')[0] || "User",
                phone: user.user_metadata?.phone || storedUser?.phone || "",
                role: user.user_metadata?.role || storedUser?.role || "user",
                emailVerified: true,
                createdAt: user.created_at,
                lastSignIn: user.last_sign_in_at
            };

            // Save to localStorage
            localStorage.setItem("trustpay_user", JSON.stringify(currentUser));
            
        } else if (storedUser) {
            // Use stored user data
            currentUser = storedUser;
            
            // Try to refresh session silently
            try {
                const { data: { session: refreshSession } } = await supabaseClient.auth.refreshSession();
                if (refreshSession?.user) {
                    currentUser.emailVerified = refreshSession.user.email_confirmed_at ? true : false;
                }
            } catch (refreshError) {
                console.log('Session refresh failed:', refreshError);
            }
        }

        console.log('Current user:', currentUser);

        // Apply saved theme
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.body.classList.add("dark");
        }

        // Load user data into UI
        loadUserData();
        
        // Load orders
        await loadOrders();
        
        // Setup auto-refresh for orders (every 30 seconds)
        if (refreshInterval) clearInterval(refreshInterval);
        refreshInterval = setInterval(loadOrders, 30000);
        
        // Setup navigation
        setupNavigation();
        
        // Show welcome message for new users
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('welcome') === 'true') {
            showMessage('Welcome to your dashboard!', 'success');
            window.history.replaceState({}, document.title, 'dashboard.html');
        }

    } catch (err) {
        console.error('Initialization error:', err);
        showMessage('Session expired. Please login again.', 'error');
        
        // Clean up and redirect
        localStorage.removeItem("trustpay_user");
        if (supabaseClient) {
            await supabaseClient.auth.signOut();
        }
        
        setTimeout(() => {
            window.location.replace("login.html");
        }, 2000);
    }
}

// ============================================
// SETUP NAVIGATION
// ============================================
function setupNavigation() {
    document.querySelectorAll('.menu-item[data-page]').forEach(item => {
        item.addEventListener('click', function(e) {
            e.preventDefault();
            
            // Update active state
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');

            // Get page to show
            const page = this.dataset.page;
            
            // Hide all pages
            ['overviewPage', 'ordersPage', 'transactionsPage', 'profilePage'].forEach(p => {
                const el = document.getElementById(p);
                if (el) el.style.display = 'none';
            });

            // Show selected page
            const selectedPage = document.getElementById(page + 'Page');
            if (selectedPage) {
                selectedPage.style.display = 'block';
            }

            // Update page title
            const titles = {
                overview: "Dashboard Overview",
                orders: "My Orders",
                transactions: "Transactions",
                profile: "My Profile"
            };
            
            const pageTitle = document.getElementById("pageTitle");
            if (pageTitle) {
                pageTitle.textContent = titles[page] || "Dashboard";
            }

            // Load page-specific data
            if (page === 'orders') {
                loadOrders(true); // Force refresh
            } else if (page === 'profile') {
                loadUserData(); // Refresh profile data
            }
        });
    });

    // Handle mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    if (menuToggle) {
        menuToggle.addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('show');
        });
    }
}

// ============================================
// LOAD USER DATA INTO UI
// ============================================
function loadUserData() {
    if (!currentUser) return;

    console.log('Loading user data:', currentUser);

    // Update user name elements
    const userNameEl = document.getElementById("userName");
    if (userNameEl) userNameEl.textContent = currentUser.name;

    const userEmailEl = document.getElementById("userEmail");
    if (userEmailEl) userEmailEl.textContent = currentUser.email;

    // Generate avatar
    const avatarText = (currentUser.name || "U")
        .split(" ")
        .map(n => n[0])
        .join("")
        .substring(0, 2)
        .toUpperCase();

    const userAvatarEl = document.getElementById("userAvatar");
    if (userAvatarEl) userAvatarEl.textContent = avatarText;

    // Profile page fields
    const profileNameEl = document.getElementById("profileName");
    if (profileNameEl) profileNameEl.textContent = currentUser.name;

    const profileEmailEl = document.getElementById("profileEmail");
    if (profileEmailEl) profileEmailEl.textContent = currentUser.email;

    const profilePhoneEl = document.getElementById("profilePhone");
    if (profilePhoneEl) profilePhoneEl.textContent = currentUser.phone || "Not set";

    const role = (currentUser.role || "user");
    const profileRoleEl = document.getElementById("profileRole");
    if (profileRoleEl) {
        profileRoleEl.textContent = role.charAt(0).toUpperCase() + role.slice(1);
    }

    // Update account creation date if available
    const memberSinceEl = document.getElementById("memberSince");
    if (memberSinceEl && currentUser.createdAt) {
        const date = new Date(currentUser.createdAt);
        memberSinceEl.textContent = date.toLocaleDateString('en-KE', { 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
    }
}

// ============================================
// LOAD ORDERS
// ============================================
async function loadOrders(forceRefresh = false) {
    if (!currentUser) return;

    try {
        console.log('Loading orders for user:', currentUser.email);

        // Get orders from localStorage
        let orders = safeParse(localStorage.getItem("trustpay_orders")) || [];

        // Filter orders for current user
        const userOrders = orders.filter(o => 
            o?.userEmail === currentUser.email || 
            o?.userId === currentUser.id
        );

        console.log(`Found ${userOrders.length} orders`);

        // Update stats
        updateOrderStats(userOrders);

        // Update tables
        updateOrdersTables(userOrders);

        // If force refresh, show message
        if (forceRefresh && userOrders.length > 0) {
            showMessage('Orders refreshed', 'success');
        }

    } catch (error) {
        console.error('Error loading orders:', error);
        showMessage('Error loading orders', 'error');
    }
}

// ============================================
// UPDATE ORDER STATISTICS
// ============================================
function updateOrderStats(orders) {
    // Calculate stats
    const totalOrders = orders.length;
    const pendingOrders = orders.filter(o => o?.status === "pending" || o?.status === "in_progress").length;
    const completedOrders = orders.filter(o => o?.status === "completed" || o?.status === "delivered").length;
    const totalValue = orders.reduce((sum, o) => sum + (parseFloat(o.amount) || 0), 0);

    // Update UI
    const totalOrdersEl = document.getElementById("totalOrders");
    if (totalOrdersEl) totalOrdersEl.textContent = totalOrders;

    const pendingOrdersEl = document.getElementById("pendingOrders");
    if (pendingOrdersEl) pendingOrdersEl.textContent = pendingOrders;

    const completedOrdersEl = document.getElementById("completedOrders");
    if (completedOrdersEl) completedOrdersEl.textContent = completedOrders;

    const totalValueEl = document.getElementById("totalValue");
    if (totalValueEl) totalValueEl.textContent = 'KES ' + totalValue.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});

    // Update recent activity if element exists
    updateRecentActivity(orders);
}

// ============================================
// UPDATE RECENT ACTIVITY
// ============================================
function updateRecentActivity(orders) {
    const activityList = document.getElementById('recentActivity');
    if (!activityList) return;

    if (orders.length === 0) {
        activityList.innerHTML = '<div class="no-activity">No recent activity</div>';
        return;
    }

    // Sort by date (newest first) and take top 5
    const recent = [...orders]
        .sort((a, b) => new Date(b.createdAt || b.date || 0) - new Date(a.createdAt || a.date || 0))
        .slice(0, 5);

    activityList.innerHTML = recent.map(order => {
        const date = new Date(order.createdAt || order.date || Date.now());
        const formattedDate = date.toLocaleDateString('en-KE', { 
            month: 'short', 
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        return `
            <div class="activity-item">
                <div class="activity-icon ${order.status}">${getStatusIcon(order.status)}</div>
                <div class="activity-details">
                    <div class="activity-title">${order.description || order.product || 'Order'}</div>
                    <div class="activity-meta">${formattedDate} • KES ${(parseFloat(order.amount) || 0).toLocaleString()}</div>
                </div>
                <span class="status-badge ${order.status}">${order.status}</span>
            </div>
        `;
    }).join('');
}

// ============================================
// GET STATUS ICON
// ============================================
function getStatusIcon(status) {
    const icons = {
        pending: '⏳',
        in_progress: '🔄',
        completed: '✅',
        delivered: '📦',
        cancelled: '❌',
        disputed: '⚠️'
    };
    return icons[status] || '📄';
}

// ============================================
// UPDATE ORDERS TABLES
// ============================================
function updateOrdersTables(orders) {
    // Sort orders by date (newest first)
    const sortedOrders = [...orders].sort((a, b) => 
        new Date(b.createdAt || b.date || 0) - new Date(a.createdAt || a.date || 0)
    );

    // Recent orders table (overview page)
    const tbody = document.getElementById("ordersTable");
    if (tbody) {
        if (!sortedOrders.length) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="5" style="text-align:center; padding:2rem; color:#9ca3af;">
                        No orders yet. 
                        <a href="start-order.html" style="color:var(--primary);">Create your first order</a>
                    </td>
                </tr>`;
        } else {
            tbody.innerHTML = sortedOrders.slice(0, 5).map(o => `
                <tr onclick="viewOrderDetails('${o.id || o.trackingNumber}')" style="cursor: pointer;">
                    <td style="font-family:monospace; font-weight:600;">
                        ${o.trackingNumber || o.order_id || o.id || 'N/A'}
                    </td>
                    <td>
                        ${(o.description || o.product || '-').substring(0, 30)}${(o.description || o.product || '').length > 30 ? '...' : ''}
                    </td>
                    <td>
                        KES ${(parseFloat(o.amount) || 0).toLocaleString()}
                    </td>
                    <td>
                        <span class="status-badge ${o.status || 'pending'}">${o.status || 'pending'}</span>
                    </td>
                    <td>
                        ${formatDate(o.createdAt || o.date)}
                    </td>
                </tr>
            `).join('');
        }
    }

    // All orders table (orders page)
    const allTbody = document.getElementById("allOrdersTable");
    if (allTbody) {
        if (!sortedOrders.length) {
            allTbody.innerHTML = `
                <tr>
                    <td colspan="6" style="text-align:center; padding:2rem; color:#9ca3af;">
                        No orders found
                    </td>
                </tr>`;
        } else {
            allTbody.innerHTML = sortedOrders.map(o => `
                <tr onclick="viewOrderDetails('${o.id || o.trackingNumber}')" style="cursor: pointer;">
                    <td style="font-family:monospace; font-weight:600;">
                        ${o.trackingNumber || o.order_id || o.id || 'N/A'}
                    </td>
                    <td>
                        ${(o.description || o.product || '-').substring(0, 30)}${(o.description || o.product || '').length > 30 ? '...' : ''}
                    </td>
                    <td>
                        KES ${(parseFloat(o.amount) || 0).toLocaleString()}
                    </td>
                    <td>
                        KES ${(parseFloat(o.fee) || 0).toLocaleString()}
                    </td>
                    <td>
                        <span class="status-badge ${o.status || 'pending'}">${o.status || 'pending'}</span>
                    </td>
                    <td>
                        ${formatDate(o.createdAt || o.date)}
                    </td>
                </tr>
            `).join('');
        }
    }
}

// ============================================
// FORMAT DATE HELPER
// ============================================
function formatDate(dateStr) {
    if (!dateStr) return '-';
    try {
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return '-';
        return date.toLocaleDateString('en-KE', { 
            year: 'numeric', 
            month: 'short', 
            day: 'numeric' 
        });
    } catch {
        return '-';
    }
}

        localStorage.setItem('selected_order', orderId);

// ============================================
// LOGOUT FUNCTION
// ============================================
async function logout() {
    try {
        console.log('Logging out...');
        
        // Clear refresh interval
        if (refreshInterval) {
            clearInterval(refreshInterval);
            refreshInterval = null;
        }

        // Sign out from Supabase
        if (supabaseClient) {
            const { error } = await supabaseClient.auth.signOut();
            if (error) console.error('Logout error:', error);
        }

        // Clear local storage
        localStorage.removeItem("trustpay_user");
        localStorage.removeItem("selected_order");
        
        // Show logout message
        showMessage('Logged out successfully', 'success');
        
        // Redirect to login
        setTimeout(() => {
            window.location.replace("login.html");
        }, 1000);

    } catch (e) {
        console.error('Logout error:', e);
        // Force redirect even on error
        localStorage.removeItem("trustpay_user");
        window.location.replace("login.html");
    }
}

// ============================================
// THEME TOGGLE
// ============================================
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark") ? "dark" : "light"
    );
    
    // Update theme toggle icon if exists
    const themeIcon = document.getElementById('themeIcon');
    if (themeIcon) {
        themeIcon.textContent = document.body.classList.contains("dark") ? '☀️' : '🌙';
    }
}

// ============================================
// REFRESH DASHBOARD
// ============================================
async function refreshDashboard() {
    const refreshBtn = document.getElementById('refreshBtn');
    if (refreshBtn) {
        refreshBtn.classList.add('rotating');
        refreshBtn.disabled = true;
    }

    try {
        await loadOrders(true);
        showMessage('Dashboard refreshed', 'success');
    } catch (error) {
        console.error('Refresh error:', error);
        showMessage('Error refreshing dashboard', 'error');
    } finally {
        if (refreshBtn) {
            setTimeout(() => {
                refreshBtn.classList.remove('rotating');
                refreshBtn.disabled = false;
            }, 500);
        }
    }
}
