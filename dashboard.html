<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TrustPay KE</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dashboard-card {
            background: white;
            color: #111827;
            padding: 3rem;
            border-radius: 20px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        h1 { color: #0d9488; margin-bottom: 1rem; }
        .user-info {
            background: #f3f4f6;
            padding: 1.5rem;
            border-radius: 12px;
            margin: 1.5rem 0;
            text-align: left;
        }
        .user-info p {
            margin: 0.5rem 0;
            padding: 0.5rem;
            border-bottom: 1px solid #e5e7eb;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        .logout-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="dashboard-card">
        <h1>Welcome to Dashboard</h1>
        <div class="user-info" id="userInfo">
            <p><strong>Loading user data...</strong></p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <script>
        // Load user data
        const userData = localStorage.getItem('trustpay_user');
        if (!userData) {
            window.location.href = 'login.html';
        } else {
            const user = JSON.parse(userData);
            document.getElementById('userInfo').innerHTML = `
                <p><strong>Name:</strong> ${user.name}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>Phone:</strong> ${user.phone || 'Not set'}</p>
                <p><strong>User ID:</strong> ${user.id.substring(0,8)}...</p>
            `;
        }

        function logout() {
            localStorage.removeItem('trustpay_user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
