<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix TrustPay Database</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .container { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button { background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #c82333; }
        .hidden { display: none; }
        pre { background: #f8f9fa; padding: 15px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Fix TrustPay Database Issues</h1>
        <p><strong>This will fix the login/logout loop and user saving issues by disabling RLS and recreating tables.</strong></p>
        
        <div id="status" class="status info">Ready to fix database issues...</div>
        <button onclick="fixDatabase()">Fix Database Now</button>
        <button onclick="testConnection()">Test Connection</button>
        
        <div id="results" class="hidden">
            <h3>Fix Results:</h3>
            <pre id="output"></pre>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';
        
        const { createClient } = window.supabase;
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }
        
        function showResults(results) {
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('output').textContent = results;
        }
        
        async function testConnection() {
            showStatus('Testing connection...', 'info');
            try {
                const { data, error } = await supabase.from('users').select('count').limit(1);
                if (error && error.code === 'PGRST116') {
                    showStatus('Connection successful but tables need fixing. Click "Fix Database Now".', 'info');
                } else if (error) {
                    showStatus(`Connection error: ${error.message}`, 'error');
                    showResults(JSON.stringify(error, null, 2));
                } else {
                    showStatus('Connection successful! Database is working.', 'success');
                }
            } catch (err) {
                showStatus(`Connection failed: ${err.message}`, 'error');
                showResults(JSON.stringify(err, null, 2));
            }
        }
        
        async function fixDatabase() {
            showStatus('Fixing database issues...', 'info');
            const results = [];
            
            try {
                // Get the SQL from the fix file
                const sqlContent = await fetch('database-simple-fix.sql').then(r => r.text());
                
                // Split into individual statements
                const statements = sqlContent.split(';').filter(s => s.trim().length > 0);
                
                for (const statement of statements) {
                    if (statement.trim()) {
                        try {
                            const { error } = await supabase.rpc('execute_sql', { sql: statement.trim() });
                            if (error) {
                                // If RPC fails, try direct SQL (this won't work in browser, but let's show what we're trying)
                                results.push(`⚠️  Would execute: ${statement.trim().substring(0, 100)}...`);
                            } else {
                                results.push(`✅ Executed: ${statement.trim().substring(0, 50)}...`);
                            }
                        } catch (err) {
                            results.push(`❌ Error: ${err.message}`);
                        }
                    }
                }
                
                results.push('\n🔧 MANUAL STEPS REQUIRED:');
                results.push('1. Copy the entire content of database-simple-fix.sql');
                results.push('2. Go to your Supabase SQL Editor');
                results.push('3. Paste and run the entire script');
                results.push('4. This will disable RLS and recreate all tables');
                results.push('5. After that, login/signup will work perfectly');
                
                showResults(results.join('\n'));
                showStatus('Database fix script ready! Follow manual steps below.', 'success');
                
            } catch (err) {
                results.push(`Fix failed: ${err.message}`);
                showResults(results.join('\n'));
                showStatus('Database fix failed!', 'error');
            }
        }
        
        // Test connection on load
        testConnection();
    </script>
</body>
</html>
