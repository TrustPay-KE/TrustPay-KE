<!DOCTYPE html>
<html>
<head>
    <title>Simple Appwrite Test</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@23.0.0"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
        }
        button { 
            padding: 12px 24px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin: 10px 5px;
            font-size: 16px;
        }
        button:hover { background: #0056b3; }
        .result {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Simple Appwrite Test</h1>
        <p>This will test your Appwrite connection with minimal code.</p>
        
        <button onclick="testAppwrite()">🧪 Test Appwrite Connection</button>
        <button onclick="testDatabase()">🗄️ Test Database</button>
        <button onclick="createUser()">👤 Create Test User</button>
        
        <div id="result" class="result"></div>
    </div>

    <script>
        function log(message, isError = false) {
            const resultDiv = document.getElementById('result');
            const className = isError ? 'error' : 'success';
            resultDiv.innerHTML += `<div class="${className}">${message}</div>`;
        }
        
        async function testAppwrite() {
            try {
                log('🔄 Testing Appwrite connection...');
                
                // Initialize Appwrite
                const client = new Appwrite()
                    .setEndpoint("https://fra.cloud.appwrite.io/v1")
                    .setProject("69c165c7003cae4214fe");
                
                // Test connection
                const response = await client.ping();
                log('✅ Appwrite connection successful!');
                log('Response: ' + JSON.stringify(response));
                
            } catch (error) {
                log('❌ Appwrite connection failed: ' + error.message, true);
                log('Error details: ' + JSON.stringify(error), true);
            }
        }
        
        async function testDatabase() {
            try {
                log('🔄 Testing database access...');
                
                const client = new Appwrite()
                    .setEndpoint("https://fra.cloud.appwrite.io/v1")
                    .setProject("69c165c7003cae4214fe");
                
                const databases = new Appwrite.Databases(client);
                
                // Try to get database
                const db = await databases.get('trustpay_main');
                log('✅ Database accessible: ' + db.name);
                
            } catch (error) {
                if (error.code === 404) {
                    log('⚠️ Database not found - needs to be created');
                    log('💡 Run the setup page first to create the database');
                } else {
                    log('❌ Database access failed: ' + error.message, true);
                }
            }
        }
        
        async function createUser() {
            try {
                log('🔄 Creating test user...');
                
                const client = new Appwrite()
                    .setEndpoint("https://fra.cloud.appwrite.io/v1")
                    .setProject("69c165c7003cae4214fe");
                
                const account = new Appwrite.Account(client);
                
                // Create a test user
                const user = await account.create(
                    'unique()' + Date.now(), // ID
                    'test@example.com', // Email
                    'Password123', // Password
                    'Test User' // Name
                );
                
                log('✅ Test user created successfully!');
                log('User ID: ' + user.$id);
                log('Email: ' + user.email);
                
            } catch (error) {
                log('❌ User creation failed: ' + error.message, true);
                if (error.code === 400) {
                    log('💡 User might already exist or email is invalid');
                }
            }
        }
    </script>
</body>
</html>
