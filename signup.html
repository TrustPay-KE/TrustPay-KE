<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Create Account | TrustPay Kenya</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0d9488; --primary-dark: #0f766e; --accent: #9333ea;
            --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
            --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563;
            --gray-700: #374151; --gray-900: #111827;
            --success: #10b981; --error: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--gray-900) 0%, #1e293b 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .signup-card {
            background: white; border-radius: 24px; padding: 2rem;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; }
        .logo-icon { width: 44px; height: 44px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 26px; height: 26px; fill: white; }
        .logo-text { font-size: 1.4rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
        .subtitle { color: var(--gray-500); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .message { padding: 0.875rem; border-radius: 10px; margin-bottom: 1rem; font-size: 0.85rem; display: none; }
        .message.success { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .message.error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; display: block; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: var(--gray-700); font-size: 0.85rem; }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--gray-200); border-radius: 10px; font-size: 0.95rem; font-family: inherit; transition: all 0.2s; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        .form-input::placeholder { color: var(--gray-400); }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 3rem; }
        .password-toggle { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-400); padding: 0.4rem; }
        .password-toggle:hover { color: var(--primary); }
        .password-toggle svg { width: 18px; height: 18px; display: block; }
        .strength-bar { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
        .strength-fill { height: 100%; width: 0%; transition: all 0.3s; border-radius: 3px; }
        .strength-fill.strength-0 { width: 0%; background: var(--gray-300); }
        .strength-fill.strength-1 { width: 25%; background: #ef4444; }
        .strength-fill.strength-2 { width: 50%; background: #f97316; }
        .strength-fill.strength-3 { width: 75%; background: #eab308; }
        .strength-fill.strength-4 { width: 100%; background: #22c55e; }
        .strength-text { font-size: 0.75rem; margin-top: 0.25rem; font-weight: 500; }
        .strength-text.strength-0 { color: var(--gray-400); }
        .strength-text.strength-1 { color: #ef4444; }
        .strength-text.strength-2 { color: #f97316; }
        .strength-text.strength-3 { color: #eab308; }
        .strength-text.strength-4 { color: #22c55e; }
        .requirements { margin-top: 0.75rem; padding: 0.75rem; background: var(--gray-100); border-radius: 8px; font-size: 0.75rem; }
        .requirement { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; color: var(--gray-500); }
        .requirement:last-child { margin-bottom: 0; }
        .requirement.valid { color: var(--success); }
        .requirement-icon { width: 16px; height: 16px; }
        .requirement-icon svg { width: 16px; height: 16px; fill: currentColor; }
        .terms { display: flex; align-items: flex-start; gap: 0.5rem; margin: 1rem 0; }
        .terms input { margin-top: 0.2rem; accent-color: var(--primary); }
        .terms label { font-size: 0.8rem; color: var(--gray-600); line-height: 1.4; }
        .terms a { color: var(--primary); text-decoration: none; }
        .signup-btn { width: 100%; padding: 0.875rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 10px; color: white; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .signup-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(13,148,136,0.4); }
        .signup-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .login-link { text-align: center; color: var(--gray-600); font-size: 0.85rem; margin-top: 1rem; }
        .login-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
            <span class="logo-text">TrustPay <span>KE</span></span>
        </div>
        <h1>Create Account</h1>
        <p class="subtitle">Join Kenya's most trusted escrow service</p>
        
        <div id="message" class="message"></div>
        
        <form id="signupForm">
            <div class="form-group">
                <label class="form-label" for="name">Full Name</label>
                <input type="text" class="form-input" id="name" placeholder="John Kamau" required autocomplete="name">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" class="form-input" id="email" placeholder="john@example.com" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">Phone (M-Pesa)</label>
                <input type="tel" class="form-input" id="phone" placeholder="254797347508" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="password" placeholder="Create a strong password" required>
                    <button type="button" class="password-toggle" id="togglePassword">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                <div class="strength-text" id="strengthText"></div>
                <div class="requirements" id="requirements">
                    <div class="requirement" id="req-length"><span class="requirement-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></span>At least 8 characters</div>
                    <div class="requirement" id="req-lower"><span class="requirement-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></span>One lowercase letter</div>
                    <div class="requirement" id="req-upper"><span class="requirement-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></span>One uppercase letter</div>
                    <div class="requirement" id="req-number"><span class="requirement-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></span>One number</div>
                    <div class="requirement" id="req-special"><span class="requirement-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg></span>One special character</div>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm your password" required>
                    <button type="button" class="password-toggle" id="toggleConfirm">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>
            
            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></label>
            </div>
            
            <button type="submit" class="signup-btn" id="submitBtn">
                <span id="btnText">Create Account</span>
                <div id="btnSpinner" class="spinner" style="display: none;"></div>
            </button>
        </form>
        
        <p class="login-link">Already have an account? <a href="login.html">Sign in</a></p>
    </div>

    <script>
        // DOM Elements
        const form = document.getElementById('signupForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const termsInput = document.getElementById('terms');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const messageEl = document.getElementById('message');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        // Check icon SVG
        const checkIcon = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        const circleIcon = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/></svg>';

        function showMessage(msg, type = 'info') {
            messageEl.textContent = msg;
            messageEl.className = 'message ' + type;
            messageEl.style.display = 'block';
        }
        function hideMessage() { messageEl.style.display = 'none'; }

        function setLoading(loading) {
            submitBtn.disabled = loading;
            nameInput.disabled = loading;
            emailInput.disabled = loading;
            phoneInput.disabled = loading;
            passwordInput.disabled = loading;
            confirmInput.disabled = loading;
            termsInput.disabled = loading;
            btnText.textContent = loading ? 'Creating account...' : 'Create Account';
            btnSpinner.style.display = loading ? 'block' : 'none';
        }

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        });
        document.getElementById('toggleConfirm').addEventListener('click', () => {
            const type = confirmInput.type === 'password' ? 'text' : 'password';
            confirmInput.type = type;
        });

        // Password strength checker
        function updateReq(id, valid) {
            const el = document.getElementById(id);
            if (el) {
                el.className = 'requirement ' + (valid ? 'valid' : '');
                el.querySelector('.requirement-icon').innerHTML = valid ? checkIcon : circleIcon;
            }
        }

        function calculateStrength(password) {
            let strength = 0;
            const hasLength = password.length >= 8;
            const hasLower = /[a-z]/.test(password);
            const hasUpper = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
            
            updateReq('req-length', hasLength);
            updateReq('req-lower', hasLower);
            updateReq('req-upper', hasUpper);
            updateReq('req-number', hasNumber);
            updateReq('req-special', hasSpecial);
            
            if (hasLength) strength++;
            if (hasLower) strength++;
            if (hasUpper) strength++;
            if (hasNumber) strength++;
            if (hasSpecial) strength++;
            
            const level = Math.min(strength, 4);
            strengthFill.className = 'strength-fill strength-' + level;
            strengthText.className = 'strength-text strength-' + level;
            const labels = ['', 'Very Weak', 'Weak', 'Fair', 'Good'];
            strengthText.textContent = labels[level];
            
            return strength;
        }

        passwordInput.addEventListener('input', () => calculateStrength(passwordInput.value));
        calculateStrength('');

        // Form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessage();

            const name = nameInput.value.trim();
            const email = emailInput.value.trim().toLowerCase();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirmPassword = confirmInput.value;

            // Validations
            if (!name || !email || !phone || !password || !confirmPassword) {
                showMessage('Please fill in all fields.', 'error');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showMessage('Please enter a valid email address.', 'error');
                return;
            }

            if (!/^254[0-9]{9}$/.test(phone) && !/^0[0-9]{9}$/.test(phone)) {
                showMessage('Phone must be 254XXXXXXXXX or 0XXXXXXXXX format.', 'error');
                return;
            }

            if (calculateStrength(password) < 4) {
                showMessage('Password must meet all requirements.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            if (!termsInput.checked) {
                showMessage('Please accept Terms and Privacy Policy.', 'error');
                return;
            }

            setLoading(true);

            try {
                // Sign up with Supabase
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { name, phone }
                    }
                });

                if (error) throw error;

                // Create profile in users table
                if (data.user) {
                    await supabase.from('users').upsert({
                        id: data.user.id,
                        email: email,
                        name: name,
                        phone: phone,
                        role: 'user',
                        created_at: new Date().toISOString()
                    });
                }

                showMessage('Account created! Check your email to verify, then login.', 'success');
                setLoading(false);
                setTimeout(() => window.location.href = 'login.html', 3000);

            } catch (err) {
                console.error('Signup error:', err);
                setLoading(false);
                let msg = 'Registration failed. Please try again.';
                if (err.message?.includes('already registered')) msg = 'This email is already registered.';
                else if (err.message) msg = err.message;
                showMessage(msg, 'error');
            }
        });

        [nameInput, emailInput, phoneInput, passwordInput, confirmInput].forEach(i => i.addEventListener('input', hideMessage));
    </script>
</body>
</html>
