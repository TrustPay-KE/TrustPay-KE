<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Sign Up | TrustPay KE</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- KEEP YOUR CSS EXACTLY SAME -->
<!-- (I DID NOT TOUCH ANY CSS OR UI) -->

</head>

<body>

<!-- KEEP YOUR ENTIRE BODY EXACTLY SAME -->
<!-- NO DESIGN CHANGE -->

<script>

/* ===============================
SUPABASE CONFIG
=============================== */

const SUPABASE_URL='https://gifgxyxuzugbkqfpnxxb.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_pg3g8EKeg8XrHV5sPWVeqw_Bb9-fzcu';

const {createClient}=supabase;

const supabaseClient=createClient(
SUPABASE_URL,
SUPABASE_ANON_KEY,
{
auth:{
persistSession:true,
autoRefreshToken:true,
detectSessionInUrl:true
}
});


/* ===============================
MESSAGE
=============================== */

function showMessage(msg,type){

const messageEl=document.getElementById("message");

messageEl.className="message "+type;

messageEl.textContent=msg;

messageEl.style.display="block";

}


/* ===============================
SIGNUP
=============================== */

document
.getElementById("signupForm")
.addEventListener("submit",async(e)=>{

e.preventDefault();

const submitBtn=document.getElementById("submitBtn");

if(submitBtn.disabled)return;



const name=document.getElementById("name").value.trim();

const email=document
.getElementById("email")
.value.trim()
.toLowerCase();

const phone=document.getElementById("phone").value.trim();

const password=document.getElementById("password").value;

const confirmPassword=
document.getElementById("confirmPassword").value;

const terms=document.getElementById("terms").checked;



/* ========= VALIDATION ========= */

if(password!==confirmPassword){

showMessage("Passwords do not match","error");

return;

}

if(password.length<8){

showMessage("Password minimum 8 characters","error");

return;

}

if(!/[a-z]/.test(password)){

showMessage("Password must contain lowercase","error");

return;

}

if(!/[A-Z]/.test(password)){

showMessage("Password must contain uppercase","error");

return;

}

if(!/[0-9]/.test(password)){

showMessage("Password must contain number","error");

return;

}

if(!terms){

showMessage("Accept Terms first","error");

return;

}



if(!/^254[0-9]{9}$/.test(phone)){

showMessage("Phone format 2547XXXXXXXX","error");

return;

}



/* ========= UI LOCK ========= */

submitBtn.disabled=true;

submitBtn.innerHTML=
'<span class="spinner"></span>Creating account...';



try{

/* ===============================
CHECK EXISTING USER
=============================== */

const existingSession=
await supabaseClient.auth.getSession();

if(existingSession.data.session){

await supabaseClient.auth.signOut();

}


/* ===============================
SIGNUP
=============================== */

const {data,error}=
await supabaseClient.auth.signUp({

email:email,

password:password,

options:{

data:{
name:name,
phone:phone,
role:"user"
},

emailRedirectTo:
"https://trustpay-ke.github.io/TrustPay-KE/login.html"

}

});


/* ===============================
ERROR HANDLING
=============================== */

if(error){

if(error.message.includes("registered")){

showMessage(
"Email already exists. Login or verify email.",
"error"
);

}

else{

showMessage(error.message,"error");

}

submitBtn.disabled=false;

submitBtn.textContent="Create Account";

return;

}



if(!data.user){

throw new Error("User creation failed");

}



/* ===============================
PROFILE SAVE
=============================== */

const {error:profileError}
=
await supabaseClient
.from("profiles")
.upsert({

id:data.user.id,

full_name:name,

phone:phone,

kyc_status:"pending"

},{onConflict:"id"});



if(profileError){

console.log(profileError.message);

}



/* ===============================
EMAIL VERIFIED ?
=============================== */

if(data.user.email_confirmed_at){

localStorage.setItem(

"trustpay_user",

JSON.stringify({

id:data.user.id,

email:data.user.email,

name:name,

phone:phone,

emailVerified:true,

kycStatus:"pending"

})

);


showMessage(
"Account created. Redirecting...",
"success"
);

setTimeout(()=>{

location.href="dashboard.html";

},1500);

return;

}


/* ===============================
NOT VERIFIED EMAIL
=============================== */

showMessage(

"✓ Account created! Check email ("+
email+
") and verify your account.",

"success"

);

document
.getElementById("resendLink")
.classList.add("show");

submitBtn.style.display="none";



}catch(err){

console.log(err);

showMessage(

"Connection error. Try again.",

"error"

);

submitBtn.disabled=false;

submitBtn.textContent="Create Account";

}

});



/* ===============================
RESEND EMAIL
=============================== */

async function resendVerification(){

const email=
document
.getElementById("email")
.value
.trim();

if(!email){

showMessage(
"Enter email first",
"error"
);

return;

}

try{

const {error}=
await supabaseClient.auth.resend({

type:"signup",

email:email

});

if(error){

showMessage(

"Resend failed : "+error.message,

"error"

);

}else{

showMessage(

"Verification email sent.",

"success"

);

}

}catch(e){

showMessage(

"Unable resend email",

"error"

);

}

}

</script>

</body>
</html>
