<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | TrustPay Kenya</title>
    <meta name="description" content="Create your TrustPay Kenya account - Kenya's safest escrow platform">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/><path d='M50 20 L75 35 L75 55 C75 70 65 80 50 85 C35 80 25 70 25 55 L25 35 Z' fill='white'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0d9488;
            --primary-dark: #0f766e;
            --primary-light: #14b8a6;
            --secondary: #9333ea;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: var(--gray-900);
        }

        .signup-container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.5rem;
            color: white;
        }

        .logo h1 {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo p {
            color: var(--gray-600);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--gray-700);
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .form-group input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .toggle-password:hover {
            color: var(--primary);
            background: rgba(13, 148, 136, 0.1);
        }

        .toggle-password svg {
            width: 20px;
            height: 20px;
        }

        .password-strength {
            margin-top: 0.75rem;
        }

        .strength-bar {
            height: 6px;
            background: var(--gray-200);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        .strength-0 { width: 0%; background: var(--error); }
        .strength-1 { width: 20%; background: var(--error); }
        .strength-2 { width: 40%; background: var(--warning); }
        .strength-3 { width: 60%; background: var(--warning); }
        .strength-4 { width: 80%; background: var(--success); }

        .strength-text {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .strength-0, .strength-1 { color: var(--error); }
        .strength-2, .strength-3 { color: var(--warning); }
        .strength-4 { color: var(--success); }

        .password-requirements {
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: var(--gray-50);
            border-radius: 8px;
            border: 1px solid var(--gray-200);
        }

        .requirement {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: var(--gray-600);
            margin-bottom: 0.25rem;
        }

        .requirement:last-child {
            margin-bottom: 0;
        }

        .requirement-icon {
            width: 16px;
            height: 16px;
            margin-right: 0.5rem;
            border-radius: 50%;
            background: var(--gray-300);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }

        .requirement.valid .requirement-icon {
            background: var(--success);
        }

        .requirement.invalid .requirement-icon {
            background: var(--gray-300);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: 0.75rem;
            margin-top: 0.125rem;
            width: 1.25rem;
            height: 1.25rem;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 0.9rem;
            color: var(--gray-600);
            cursor: pointer;
            line-height: 1.5;
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .signup-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .signup-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13, 148, 136, 0.3);
        }

        .signup-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            display: none;
        }

        .signup-btn.loading .spinner {
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .message.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .message.info {
            background: rgba(59, 130, 246, 0.1);
            color: var(--info);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .divider {
            text-align: center;
            margin: 2rem 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gray-300);
        }

        .divider span {
            background: rgba(255, 255, 255, 0.95);
            padding: 0 1rem;
            color: var(--gray-500);
            font-size: 0.9rem;
            position: relative;
        }

        .resend-section {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }

        .resend-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--gray-600);
        }

        .login-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 2rem;
                border-radius: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/>
                </svg>
            </div>
            <h1>TrustPay KE</h1>
            <p>Join Kenya's safest escrow platform</p>
        </div>

        <form id="signupForm">
            <div id="message" class="message"></div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" required placeholder="254XXXXXXXXX">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required placeholder="Create a strong password">
                    <button type="button" id="togglePassword" class="toggle-password">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div id="strengthFill" class="strength-fill strength-0"></div>
                    </div>
                    <div id="strengthText" class="strength-text strength-0">Password Strength</div>
                    <div class="password-requirements">
                        <div id="req-length" class="requirement invalid">
                            <div class="requirement-icon">✓</div>
                            <span>At least 8 characters</span>
                        </div>
                        <div id="req-lower" class="requirement invalid">
                            <div class="requirement-icon">✓</div>
                            <span>One lowercase letter</span>
                        </div>
                        <div id="req-upper" class="requirement invalid">
                            <div class="requirement-icon">✓</div>
                            <span>One uppercase letter</span>
                        </div>
                        <div id="req-number" class="requirement invalid">
                            <div class="requirement-icon">✓</div>
                            <span>One number</span>
                        </div>
                        <div id="req-special" class="requirement invalid">
                            <div class="requirement-icon">✓</div>
                            <span>One special character</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrapper">
                    <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                    <button type="button" id="toggleConfirmPassword" class="toggle-password">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">
                    I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" id="submitBtn" class="signup-btn">
                <span id="btnText">Create Account</span>
                <div id="btnSpinner" class="spinner"></div>
            </button>
        </form>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="resend-section">
            Didn't receive verification email? <span id="resendBtn" class="resend-link">Resend Email</span>
        </div>

        <div class="login-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script>
        // Initialize Supabase
        const { createClient } = window.supabase;
        const supabase = createClient(
            'https://gifgxyxuzugbkqfpnxxb.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s'
        );

        // DOM elements
        let signupForm, nameInput, emailInput, phoneInput, passwordInput, confirmPasswordInput;
        let termsCheckbox, submitBtn, btnText, btnSpinner, messageEl, resendBtn;
        let strengthFill, strengthText, togglePassword, toggleConfirmPassword;

        // Initialize DOM elements
        function initDOM() {
            signupForm = document.getElementById('signupForm');
            nameInput = document.getElementById('name');
            emailInput = document.getElementById('email');
            phoneInput = document.getElementById('phone');
            passwordInput = document.getElementById('password');
            confirmPasswordInput = document.getElementById('confirmPassword');
            termsCheckbox = document.getElementById('terms');
            submitBtn = document.getElementById('submitBtn');
            btnText = document.getElementById('btnText');
            btnSpinner = document.getElementById('btnSpinner');
            messageEl = document.getElementById('message');
            resendBtn = document.getElementById('resendBtn');
            strengthFill = document.getElementById('strengthFill');
            strengthText = document.getElementById('strengthText');
            togglePassword = document.getElementById('togglePassword');
            toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        }

        // Helper functions
        function showMessage(msg, type = 'info') {
            if (messageEl) {
                messageEl.textContent = msg;
                messageEl.className = `message ${type}`;
                messageEl.style.display = 'block';
            }
        }

        function hideMessage() {
            if (messageEl) {
                messageEl.style.display = 'none';
            }
        }

        function setLoading(loading) {
            if (submitBtn) submitBtn.disabled = loading;
            if (nameInput) nameInput.disabled = loading;
            if (emailInput) emailInput.disabled = loading;
            if (phoneInput) phoneInput.disabled = loading;
            if (passwordInput) passwordInput.disabled = loading;
            if (confirmPasswordInput) confirmPasswordInput.disabled = loading;
            if (termsCheckbox) termsCheckbox.disabled = loading;
            if (btnText) btnText.textContent = loading ? 'Creating account...' : 'Create Account';
            if (submitBtn) submitBtn.classList.toggle('loading', loading);
        }

        function updateToggleIcon(button, input) {
            const isPassword = input.type === 'password';
            button.innerHTML = isPassword 
                ? '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        function updateRequirement(id, valid) {
            const el = document.getElementById(id);
            if (el) {
                el.className = `requirement ${valid ? 'valid' : 'invalid'}`;
            }
        }

        function calculateStrength(password) {
            let strength = 0;
            const hasLength = password.length >= 8;
            const hasLower = /[a-z]/.test(password);
            const hasUpper = /[A-Z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);

            updateRequirement('req-length', hasLength);
            updateRequirement('req-lower', hasLower);
            updateRequirement('req-upper', hasUpper);
            updateRequirement('req-number', hasNumber);
            updateRequirement('req-special', hasSpecial);

            if (hasLength) strength++;
            if (hasLower) strength++;
            if (hasUpper) strength++;
            if (hasNumber) strength++;
            if (hasSpecial) strength++;

            const level = Math.min(strength, 4);
            if (strengthFill) {
                strengthFill.className = `strength-fill strength-${level}`;
            }
            if (strengthText) {
                strengthText.className = `strength-text strength-${level}`;
                
                const labels = ['Password Strength', 'Very Weak', 'Weak', 'Fair', 'Good'];
                strengthText.textContent = labels[level];
            }

            return strength;
        }

        // Setup event listeners
        function setupEventListeners() {
            if (togglePassword) {
                togglePassword.addEventListener('click', () => {
                    const isPassword = passwordInput.type === 'password';
                    passwordInput.type = isPassword ? 'text' : 'password';
                    updateToggleIcon(togglePassword, passwordInput);
                });
            }

            if (toggleConfirmPassword) {
                toggleConfirmPassword.addEventListener('click', () => {
                    const isPassword = confirmPasswordInput.type === 'password';
                    confirmPasswordInput.type = isPassword ? 'text' : 'password';
                    updateToggleIcon(toggleConfirmPassword, confirmPasswordInput);
                });
            }

            if (passwordInput) {
                passwordInput.addEventListener('input', () => calculateStrength(passwordInput.value));
            }

            [nameInput, emailInput, phoneInput, passwordInput, confirmPasswordInput].forEach(input => {
                if (input) {
                    input.addEventListener('input', hideMessage);
                }
            });

            // Form submission
            if (signupForm) {
                signupForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    hideMessage();

                    const name = nameInput.value.trim();
                    const email = emailInput.value.trim().toLowerCase();
                    const phone = phoneInput.value.trim();
                    const password = passwordInput.value;
                    const confirmPassword = confirmPasswordInput.value;

                    // Validation
                    if (!name || !email || !phone || !password || !confirmPassword) {
                        showMessage('Please fill in all fields.', 'error');
                        return;
                    }

                    if (!email.includes('@') || !email.includes('.')) {
                        showMessage('Please enter a valid email address.', 'error');
                        return;
                    }

                    if (!/^254[0-9]{9}$/.test(phone)) {
                        showMessage('Phone must be in format 254XXXXXXXXX', 'error');
                        return;
                    }

                    if (calculateStrength(password) < 4) {
                        showMessage('Password must meet all requirements.', 'error');
                        return;
                    }

                    if (password !== confirmPassword) {
                        showMessage('Passwords do not match.', 'error');
                        return;
                    }

                    if (!termsCheckbox.checked) {
                        showMessage('Please accept Terms and Privacy Policy.', 'error');
                        return;
                    }

                    setLoading(true);

                    try {
                        // Create user with Supabase Auth
                        const { data, error } = await supabase.auth.signUp({
                            email,
                            password,
                            options: {
                                data: {
                                    name,
                                    phone
                                }
                            }
                        });

                        if (error) throw error;

                        showMessage('Account created! Please check your email to verify your account.', 'success');
                        setLoading(false);
                        
                        // Redirect to login after 2 seconds
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);

                    } catch (err) {
                        console.error('Signup error:', err);
                        setLoading(false);

                        let errorMsg = 'Registration failed. Please try again.';
                        if (err.message.includes('already registered')) {
                            errorMsg = 'This email is already registered. Try logging in.';
                        } else if (err.message.includes('Invalid email')) {
                            errorMsg = 'Please enter a valid email address.';
                        } else if (err.message.includes('password')) {
                            errorMsg = 'Password is too weak. Please use a stronger password.';
                        } else if (err.message) {
                            errorMsg = err.message;
                        }

                        showMessage(errorMsg, 'error');
                    }
                });
            }

            // Resend email
            if (resendBtn) {
                resendBtn.addEventListener('click', async () => {
                    const email = emailInput.value.trim();
                    if (!email) {
                        showMessage('Please enter your email address first.', 'error');
                        return;
                    }

                    try {
                        const { error } = await supabase.auth.resend({
                            type: 'signup',
                            email,
                        });

                        if (error) throw error;

                        showMessage('Verification email sent! Please check your inbox.', 'success');
                    } catch (err) {
                        console.error('Resend error:', err);
                        showMessage('Failed to resend verification email. Please try again.', 'error');
                    }
                });
            }
        }

        // Initialize everything when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            initDOM();
            setupEventListeners();
            calculateStrength('');
        });
    </script>
</body>
</html>
