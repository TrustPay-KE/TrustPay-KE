<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TrustPay KE</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d9488'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #0d9488; --primary-dark: #0f766e; --accent: #9333ea; --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-600: #4b5563; --gray-900: #111827; }
        body { font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 2rem; }
        .signup-container { width: 100%; max-width: 460px; }
        .signup-card { background: white; border-radius: 20px; padding: 2.5rem; box-shadow: 0 25px 50px rgba(0,0,0,0.3); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 2rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--primary), var(--accent)); border-radius: 14px; display: flex; align-items: center; justify-content: center; }
        .logo-icon svg { width: 28px; height: 28px; fill: white; }
        .logo-text { font-size: 1.5rem; font-weight: 800; color: var(--gray-900); }
        .logo-text span { color: var(--primary); }
        h1 { font-size: 1.5rem; font-weight: 700; color: var(--gray-900); text-align: center; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray-600); text-align: center; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-900); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--gray-200); border-radius: 12px; font-size: 1rem; font-family: inherit; transition: all 0.3s ease; }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,148,136,0.1); }
        .form-input.error { border-color: #ef4444; }
        .password-wrapper { position: relative; }
        .password-toggle { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--gray-600); font-size: 1.2rem; }
        .password-toggle:hover { color: var(--primary); }
        .password-strength { margin-top: 0.5rem; }
        .strength-bar { height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: all 0.3s; }
        .strength-fill.weak { width: 25%; background: #ef4444; }
        .strength-fill.fair { width: 50%; background: #f59e0b; }
        .strength-fill.good { width: 75%; background: #3b82f6; }
        .strength-fill.strong { width: 100%; background: #10b981; }
        .terms { display: flex; align-items: flex-start; gap: 0.75rem; margin: 1.5rem 0; }
        .terms input { margin-top: 0.25rem; width: 18px; height: 18px; accent-color: var(--primary); }
        .terms label { font-size: 0.875rem; color: var(--gray-600); }
        .signup-btn { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border: none; border-radius: 12px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .signup-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(13,148,136,0.3); }
        .signup-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .message { padding: 1rem; border-radius: 12px; margin-bottom: 1rem; font-size: 0.9rem; display: none; }
        .message.success { background: #d1fae5; color: #065f46; display: block; border-left: 4px solid #10b981; }
        .message.error { background: #fee2e2; color: #991b1b; display: block; border-left: 4px solid #ef4444; }
        .message.info { background: #e0f2fe; color: #0369a1; display: block; border-left: 4px solid #0ea5e9; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .divider { display: flex; align-items: center; margin: 1.5rem 0; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--gray-200); }
        .divider span { padding: 0 1rem; font-size: 0.875rem; color: var(--gray-600); }
        .login-link { text-align: center; margin-top: 1.5rem; color: var(--gray-600); font-size: 0.9rem; }
        .login-link a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .login-link a:hover { text-decoration: underline; }
        .header-actions { display: flex; gap: 0.5rem; }
        .lang-toggle { background: var(--primary); border: none; cursor: pointer; padding: 0.4rem 0.6rem; border-radius: 8px; color: white; font-weight: 700; font-size: 0.7rem; }
        .search-toggle { background: none; border: none; cursor: pointer; padding: 0.5rem; border-radius: 8px; color: var(--gray-600); }
        .search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 10000; justify-content: center; align-items: flex-start; padding-top: 10vh; }
        .search-modal.active { display: flex; }
        .search-modal-content { background: white; border-radius: 16px; width: 90%; max-width: 600px; box-shadow: 0 25px 80px rgba(0,0,0,0.3); overflow: hidden; }
        .search-header { display: flex; align-items: center; padding: 1rem; border-bottom: 1px solid #e5e7eb; }
        .search-input { flex: 1; border: none; font-size: 1.1rem; padding: 0.75rem; background: none; outline: none; color: #111827; }
        .search-close { background: none; border: none; cursor: pointer; padding: 0.5rem; color: #4b5563; }
        .search-results { max-height: 400px; overflow-y: auto; padding: 1rem; }
        .search-hint { color: #4b5563; text-align: center; padding: 2rem; }
        .search-result-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 10px; text-decoration: none; color: #111827; }
        .search-result-item:hover { background: #f3f4f6; }
        .search-result-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #0d9488, #9333ea); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; }
        .search-result-text h4 { font-weight: 600; margin-bottom: 0.25rem; }
        .search-result-text p { font-size: 0.85rem; color: #4b5563; margin: 0; }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                </div>
                <span class="logo-text">TrustPay <span>KE</span></span>
            </div>
            <h1>Create Account</h1>
            <p class="subtitle">Join Kenya's safest escrow platform</p>
            <div id="message" class="message"></div>
            <form id="signupForm">
                <div class="form-group">
                    <label class="form-label" for="name">Full Name</label>
                    <input type="text" class="form-input" id="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="phone">Phone Number</label>
                    <input type="tel" class="form-input" id="phone" placeholder="254712345678" required>
                    <small style="color: var(--gray-600); font-size: 0.75rem;">Format: 254 followed by 9 digits</small>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="Create password" required oninput="checkStrength()">
                        <button type="button" class="password-toggle" onclick="togglePassword()" tabindex="-1">👁</button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Confirm password" required oninput="validateMatch()">
                </div>
                <div class="terms">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to Terms & Privacy</label>
                </div>
                <button type="submit" class="signup-btn" id="submitBtn">Create Account</button>
            </form>
            <div class="divider"><span>or</span></div>
            <p class="login-link">Already have account? <a href="login.html">Sign in</a></p>
        </div>
    </div>

    <div class="header-actions" style="position:fixed;top:1rem;right:1rem;">
        <button class="lang-toggle" id="langToggle">EN</button>
        <button class="search-toggle" id="searchToggle">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
    </div>

    <div class="search-modal" id="searchModal">
        <div class="search-modal-content">
            <div class="search-header">
                <input type="text" class="search-input" id="searchInput" placeholder="Search TrustPay KE..." autocomplete="off">
                <button class="search-close" id="searchClose"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
            </div>
            <div class="search-results" id="searchResults"><div class="search-hint">Start typing to search...</div></div>
        </div>
    </div>

    <script>
        // YOUR CORRECT SUPABASE CONFIGURATION
        const SUPABASE_URL = 'https://gifgxyxuzugbkqfpnxxb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdpZmd4eXh1enVnYmtxZnBueHhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxMTMxNjQsImV4cCI6MjA4NzY4OTE2NH0.gfvLygnEPujUtD-_9m4bxousjOVM9q4-mLeqDMotJ3s';

        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        function showMessage(msg, type) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.className = 'message ' + type;
            msgEl.style.display = 'block';
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
        }

        function checkStrength() {
            const pwd = document.getElementById('password').value;
            const fill = document.getElementById('strengthFill');
            let strength = 0;
            
            if (pwd.length >= 8) strength++;
            if (/[a-z]/.test(pwd)) strength++;
            if (/[A-Z]/.test(pwd)) strength++;
            if (/[0-9]/.test(pwd)) strength++;
            
            fill.className = 'strength-fill';
            if (pwd.length === 0) return;
            if (strength <= 2) fill.classList.add('weak');
            else if (strength === 3) fill.classList.add('fair');
            else fill.classList.add('strong');
        }

        function validateMatch() {
            const pwd = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const confirmInput = document.getElementById('confirmPassword');
            
            if (confirm && pwd !== confirm) {
                confirmInput.classList.add('error');
            } else {
                confirmInput.classList.remove('error');
            }
        }

        function getRedirectUrl() {
            const hostname = window.location.hostname;
            if (hostname === 'localhost' || hostname === '127.0.0.1') {
                return 'http://localhost:8000/login.html';
            }
            return 'https://trustpay.co.ke/login.html';
        }

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim().toLowerCase();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const btn = document.getElementById('submitBtn');

            // Validation
            if (!name || name.length < 2) {
                showMessage('Please enter your full name', 'error');
                return;
            }

            if (!email || !email.includes('@')) {
                showMessage('Please enter a valid email', 'error');
                return;
            }

            if (!phone.match(/^254[0-9]{9}$/)) {
                showMessage('Phone must be: 254712345678', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            if (!terms) {
                showMessage('Please accept terms and conditions', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Creating Account...';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            full_name: name,
                            phone: phone
                        },
                        emailRedirectTo: getRedirectUrl() + '?verified=true'
                    }
                });

                if (error) {
                    if (error.message.includes('already registered')) {
                        showMessage('Email already registered. Please login.', 'error');
                    } else {
                        showMessage('Error: ' + error.message, 'error');
                    }
                    btn.disabled = false;
                    btn.innerHTML = 'Create Account';
                    return;
                }

                if (data.user) {
                    showMessage('✅ Account created! Please check your email to verify.', 'success');
                    btn.innerHTML = '✓ Account Created!';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html?registered=true&email=' + encodeURIComponent(email);
                    }, 3000);
                }

            } catch (err) {
                showMessage('Connection error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Create Account';
            }
        });

        const langToggle = document.getElementById('langToggle');
        let currentLang = localStorage.getItem('lang') || 'en';
        langToggle.textContent = currentLang === 'en' ? 'EN' : 'SW';
        langToggle.addEventListener('click', () => { currentLang = currentLang === 'en' ? 'sw' : 'en'; localStorage.setItem('lang', currentLang); langToggle.textContent = currentLang === 'en' ? 'EN' : 'SW'; });
        
        const searchToggle = document.getElementById('searchToggle');
        const searchModal = document.getElementById('searchModal');
        const searchClose = document.getElementById('searchClose');
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        const searchData = [
            { title: 'How Escrow Works', desc: 'Learn how our escrow protection works', url: 'index.html#how' },
            { title: 'Fees & Pricing', desc: 'View our transparent fee structure', url: 'index.html#fees' },
            { title: 'Start an Order', desc: 'Create your first protected transaction', url: 'start-order.html' },
            { title: 'Login', desc: 'Access your TrustPay account', url: 'login.html' },
            { title: 'Sign Up', desc: 'Create a free account today', url: 'signup.html' },
            { title: 'Blog', desc: 'Read our latest articles and guides', url: 'blog.html' },
            { title: 'Safety Guide', desc: 'Protect yourself from scams', url: 'safety-guide.html' },
            { title: 'About Us', desc: 'Learn about TrustPay KE', url: 'about.html' },
            { title: 'Contact Us', desc: 'Get in touch with our team', url: 'contact.html' },
            { title: 'Privacy Policy', desc: 'How we protect your data', url: 'privacy.html' },
            { title: 'Terms of Service', desc: 'Our terms and conditions', url: 'terms.html' },
            { title: 'Dispute Resolution', desc: 'How we handle disputes', url: 'dispute-policy.html' }
        ];
        function performSearch(query) {
            if (!query.trim()) { searchResults.innerHTML = '<div class="search-hint">Start typing to search...</div>'; return; }
            const q = query.toLowerCase();
            const matches = searchData.filter(item => item.title.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q));
            if (matches.length === 0) { searchResults.innerHTML = '<div class="search-hint">No results found.</div>'; return; }
            searchResults.innerHTML = matches.map(item => `<a href="${item.url}" class="search-result-item"><div class="search-result-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div class="search-result-text"><h4>${item.title}</h4><p>${item.desc}</p></div></a>`).join('');
        }
        searchToggle.addEventListener('click', () => { searchModal.classList.add('active'); setTimeout(() => searchInput.focus(), 100); });
        searchClose.addEventListener('click', () => searchModal.classList.remove('active'));
        searchModal.addEventListener('click', (e) => { if (e.target === searchModal) searchModal.classList.remove('active'); });
        searchInput.addEventListener('input', (e) => performSearch(e.target.value));
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && searchModal.classList.contains('active')) searchModal.classList.remove('active'); if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); searchModal.classList.add('active'); setTimeout(() => searchInput.focus(), 100); } });
    </script>
</body>
</html>
